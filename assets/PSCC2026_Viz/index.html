      "abstract": "Distribution networks (DNs) are shifting from passive to active due to an ever-increasing share of inverter-based resources (IBRs), whose simulation is computationally demanding. To address this issue, we propose a DN reduction method that boosts simulation efficiency in two steps. First, the DN is synthesized as a multi-port circuit, with one port at the substation downstream of the transmission grid, and one for each gridfollowing IBR connected to the DN. Second, IBRs with a similar voltage dependency are clustered, and only a representative IBR per cluster is retained in the reduced DN. The method is compatible with DNs of any size (be them balanced or unbalanced, three-phase, single-phase, with or without neutral) and clusters IBRs through a numerical approach that hinges only on power flow and small-signal analysis. Thus, it is agnostic to the IBR model used and can suitably group IBRs with different power set-points and ratings. Simulation results of the IEEE 8500 node DN prove the accuracy and CPU time speed-up of the method.",

      "abstract": "Cascading outage simulation has been studied primarily in the context of synchronous generator-dominated power systems. However, with the increasing penetration of inverterbased resources (IBRs), particularly of grid-forming (GFM) type, renewed attention is required. This paper proposes an enhanced AC power flow (AC PF)-based cascading outage simulation method that incorporates the impact of GFM IBRs, specifically addressing their fault ride-through (FRT) capability and IBRs trip in case of non-compliance. To achieve this, an extended AC power flow model is developed, which includes a steady-state representation of GFMs and refined frequency- and voltage-dependent models for synchronous machines, replacing the conventional simplified PV bus model. Case studies conducted on the IEEE 39-bus system validate the applicability of the proposed method under various initial events, showing that non-FRT-compliant IBRs can trip during or immediately after fault, altering dramatically the path and outcome of the cascade. While conventional AC PF methods fail to converge in these scenarios, the proposed approach successfully evaluates the system state at each tier of the cascade, accurately simulating system behavior throughout the cascading outage. The proposed approach provides a deeper understanding of cascading outage behavior in power systems with high penetration of GFM IBRs.",

      "abstract": "Operation of modern power systems depends on high-quality data and forecasts. As the provision of valuable forecasts shifts to independent providers, such as renewable and distributed generators, there is a growing need for forecast-sharing markets. However, existing forecast valuation mechanisms, often inspired by game theory, overlook physical network constraints and the dispersed locations of forecast providers in realistic power systems. This work shows that widely used valuation methods, such as the Shapley value, can yield counterintuitive results when applied to load forecasting in distribution networks. Specifically, due to the location of providers and voltage constraints, less accurate forecasts may appear more valuable than precise ones, while some providers may even be penalised. Moreover, valueoriented mechanisms lack incentive compatibility, as certain providers may systematically misreport load forecasts to receive higher payments. These findings expose the limitations of existing forecast valuation approaches and suggest that incorporating accuracy-based scoring may enhance value-oriented mechanisms.",

      "abstract": "Electricity market studies increasingly require system-scale simulations with large numbers of distributed and f lexible assets, making dimensionality reduction via clustering and aggregation essential. The fidelity of these reductions critically depends on feature selection. This paper proposes a marketoriented, quantitative feature selection method that derives clustering features from dual information of a fast market-clearing linear program (LP) model. For each technology and bidding zone, an aggregated LP is solved to obtain parameter-level dual variables. These are combined with parameter variation ranges to compute unit-level effective elasticities, which quantify the relative influence of each parameter on total system cost. The resulting elasticities provide dimensionless weights that scale the candidate features, ensuring that the clustering reflects their true economic relevance. The methodology is compatible with standard LP-based market-clearing formulations without altering convexity or solver settings. Its objective is to retain operational behavior relevant to dispatch and prices while substantially reducing problem size. We validated the method on batteries, demand-side response, and thermal units of a Germany-focused case based on Network Development Plan 2037/2045 to substantiate scalability and benchmark against simpler aggregation baselines.",

      "abstract": "Rising electricity demand and the growing integration of renewables are intensifying congestion in transmission grids. Grid topology optimization through busbar splitting (BuS) and optimal transmission switching can alleviate grid congestion and reduce the generation costs in a power system. However, BuS optimization requires a large number of binary variables, and analyzing all the substations for potential new topological actions is computationally intractable, particularly in large grids. To tackle this issue, we propose a set of metrics to identify and rank promising candidates for BuS, focusing on finding buses where topology optimization can reduce generation costs. To assess the effect of BuS on the identified buses, we use a combined mixedinteger convex-quadratic BuS model to compute the optimal topology and test it with the non-linear non-convex AC optimal power flow (OPF) simulation to show its AC feasibility and generation cost reduction compared to the AC-OPF simulations. By testing and validating the proposed metrics on test cases of different sizes, we show that they are able to identify busbars that reduce the total generation costs when their topology is optimized. Thus, the metrics enable effective selection of busbars for BuS, with no need to test every busbar in the grid, one at a time.",

      "abstract": "This paper examines defending the power grid against load-altering attacks using electric vehicle charging. It proposes to preventively segment the cyber infrastructure that charging station operators (CSOs) use to communicate with and control their charging stations, thereby limiting the impact of successful cyber-attacks. Using real German charging station data and a reconstructed transmission grid model, a threat analysis shows that without segmentation, the successful hack of just two CSOs can overload two transmission grid branches, exceeding the N-1 security margin and necessitating defense measures. A novel defense design problem is then formulated that minimizes the number of imposed segmentations while bounding the number of branch overloads under worst-case attacks. The resulting IP-MILP bi-level problem can be solved with an exact column and constraint generation algorithm and with heuristics for fast computation on large-scale instances. For the nearreal- world Germany case, the applicability of the heuristics is demonstrated and validated under relevant load and dispatch scenarios. It is found that the simple scheme of segmenting CSOs evenly by their installed capacity leads to only 23% more segments compared to the heuristic optimization result, suggesting potential relevance as a regulatory measure.",

      "abstract": "Incentivizing flexible consumption of end-users is key to maximizing local exchanges within Renewable Energy Communities. While centralized coordination for flexible resource planning raises concerns about data privacy and fair distribution of benefits, state-of-the-art approaches (e.g., bi-level, ADMM) often face computational complexity and convexity challenges, limiting the precision of embedded flexible models. This work proposes an iterative resolution procedure to solve the decentralized flexibility planning with a central operator as a coordinator within a community. The community operator asks for upward or downward flexibility depending on the global needs, while members can individually react with an offer for flexible capacity. This approach ensures individual optimality while converging towards a global optimum, as validated on a 20-member domestic case study for which the gap in terms of collective bill is not more than 2.4% between the decentralized and centralized coordination schemes.",

      "id": "151",
      "title": "Assessment of Power System Stability Considering Multiple Time-Scale Dynamics: Insights into Saddle-Node and Hopf Bifurcations",
      "authors": [

      ],
      "abstract": "Real power systems exhibit dynamics that evolve over various time scales. Some dynamics are exceptionally fast, such as electromagnetic transients, which occur on the order of microseconds. Others are notably slow, like load restoration processes and the action of Over-Excitation Limiters (OELs), which can span tens of seconds or even minutes. Between these extremes lie electromechanical transients, characterized by dynamics ranging from a few milliseconds to several seconds. Traditionally, power engineers categorize stability phenomena and related studies based on these time scales. For example, when assessing fast dynamics involving fast inverter controls (e.g., inner current controls), it is common to ignore slower dynamics like OELs that operate over several seconds or minutes. Conversely, when evaluating slower phenomena such as long-term voltage stability, faster dynamics (e.g., fast inverter controls) are often disregarded. While these assumptions may be valid in many cases, they imply that certain dynamics are inherently stable by completely neglecting them. This time-scale decomposition is effectively achieved using a technique called singular perturbation, which is so ingrained in the power engineering community that engineers rarely question it or may not even recognize its implications. Nevertheless, real networks do not perform time-scale decomposition. On the contrary, multi-time scale dynamics are intertwined and can have a significant impact on each other. In fact, well-known literature, such as [1], refers to this dependency between dynamics that evolve over different time scales as S-LT1, S-LT2, and S-LT3. In simple terms, they explain the different mechanisms by which slow dynamics can act in a way that forces the fast dynamics to lose equilibrium. These connections between different time-scale dynamics are not explicitly addressed in the well-known IEEE classification of power system stability. Typical results of such interactions include: 1) Saddle-Node Bifurcation of the fast dynamics induced by slow dynamics, which typically manifests as a sudden system collapse when a generator loses synchronism, and 2) a Hopf Bifurcation of fast dynamics (see Fig. 1) induced by slow dynamics, which typically manifests as oscillatory instabilities when complex-conjugate eigenvalues are pushed into the right semi-plane. This paper addresses the importance of assessing system stability considering the intrinsic interactions between different dynamics. It shows that if time-scale decomposition is always performed, instabilities that may occur in a real physical system can be missed in simulations. This paper builds on works previously published by the author [2], [3]. It advances the previous investigations by mathematically formulating the types of instabilities in terms of their bifurcation types and showing the consequences of each. The paper uses the well-known IEEE test system for voltage stability assessment (known as the Nordic test system). Since addressing new system technologies is essential in state-of-the-art research, this work analyzes the performance of grid-following and grid-forming inverters, highlighting potential issues and advantages of each technology within the scope of multi-time scale dynamics.",

      "abstract": "This study proposes an interpretable framework for understanding the dynamics of daily electric vehicle (EV) charging demand using three years of residential charging data from Denmark. By aligning daily boundaries with charging demand peaks, we uncover behavioral patterns driven by price signals, routines, seasonality, and weather. A key insight is that EV users react more consistently to relative price changes, especially shifts in nighttime prices from the previous day, than to absolute values. Demand also shows strong routine and seasonal influences, with nighttime prices dominating in winter and midday prices becoming more influential in summer. Comparing machine-learning algorithms (Random Forest, Catboost) with a Linear Regression model, we demonstrate that the latter provides the best balance between performance and interpretability, indicating weakly nonlinear patterns of aggregated charging behavior. Overall, the proposed framework offers a structured approach to uncovering EV demand dynamics, providing system operators and flexibility providers with clear, actionable insights.",

      "abstract": "As the penetration of distributed energy resources (DERs) increases, harnessing their flexibility becomes critical for power system operations. Virtual power plants (VPPs) offer a promising solution. However, most existing scheduling tools rely on simplified DER or grid models and largely overlook local flexibility procurement mechanisms such as dynamic network tariffs. This paper proposes a two-stage stochastic optimization framework for VPP multi-market scheduling that integrates detailed device-level constraints, network limitations, and operational and market uncertainties. Conditional value-at-risk is incorporated to represent risk preferences, and Benders decomposition ensures tractability with extensive scenario sets. The model jointly optimizes bidding across energy and reserve markets while explicitly accounting for local flexibility procurement through dynamic network tariffs. The results from a realistic case study show that both risk-neutral and risk-averse strategies exploit arbitrage opportunities. However, risk aversion reduces profit volatility through closer alignment with physical dispatch. Dynamic tariffs unlock local flexibility by shifting demand across the day, though strong tariff signals reduce expected profitability by up to 65% with limited additional flexibility gains.",

      "abstract": "Multi-terminal HVDC (MTDC) grids are gaining increasing attention for their potential to support renewable integration and enhance the flexibility and reliability of power transfer. Within such systems, grid-forming (GFM) converters are crucial for stable synchronisation and supporting converterdominated grids. Their integration, however, requires embedding DC voltage control functionality within the GFM control scheme. This paper proposes a droop-based GFM control strategy enabling multiple converters to share DC voltage control while preserving grid-forming behaviour. Moreover, to address large disturbance challenges within MTDC systems, a virtual powerbased current limitation method is adapted for DC voltagecontrolled GFMs, improving fault ride-through and post-fault resynchronisation. Electromagnetic transient simulations on a modular multilevel converter (MMC) based MTDC network confirm improved stability under power variations, phase jumps, and severe AC faults.",

      "abstract": "The number of electric vehicles (EVs) has been increasing. According to estimates, by 2030, the proliferation of EVs will result in the availability of 100–200 GWh/year of electricity storage through EVs. After being used in EVs under highly dynamic charging and discharging profiles and reaching a particular capacity level (e.g., 80% of the beginning of life (BoL) capacity), EV battery cells can be repurposed, in their second life, for less-demanding applications such as stationary energy storage systems (ESSs). To evaluate the viability and assess degradation of batteries in their second life while providing ancillary services, this paper proposes a two-stage framework for generating second-life cycling profiles that mimic battery energy storage system (BESS) operation. Since these cycles differ significantly from typical driving cycles, we use energy throughput as a reference metric, which can be translated into an equivalent number of cycles. The proposed profile generation method is generic and applies to different types of ancillary services, battery sizes, and chemistries. We use a generic per-unit power signal that represents the requested power from a BESS for a selected service (e.g., frequency containment reserve, self-consumption). This signal can be derived from available historical data. In the first stage, the signal is scaled to adapt to a desired battery size. We maintain the state-of-energy (SOE) within a predefined range by optimally offsetting the power profile. This is achieved by formulating and solving an optimization problem in terms of battery power and state-of-energy (SOE). The resulting optimal power profile serves as the input for the second stage. In the second stage, we verify whether the battery’s operational constraints—such as current and voltage limits—are satisfied. This is done by converting the power profile into a current profile using a BESS equivalent circuit model (ECM). The modeller can use any generic ECM       "abstract": "Scenario reduction (SR) alleviates the computational complexity of scenario-based stochastic optimization with conditional value-at-risk (SBSO-CVaR) by identifying representative scenarios to depict the underlying uncertainty and tail risks. Existing distribution-driven SR methods emphasize statistical similarity but often exclude extreme scenarios, leading to weak tailrisk awareness and insufficient problem-specific representativeness. Instead, this paper proposes an iterative problem-driven scenario reduction framework. Specifically, we integrate the SBSO-CVaR problem structure into SR process and project the original scenario set from distribution space onto the problem space. Subsequently, to minimize the SR optimality gap with acceptable computation complexity, we propose a tractable iterative problem-driven scenario reduction (IPDSR) method that selects representative scenarios that best approximate the optimality distribution of the original scenario set while preserving tail risks. Furthermore, the iteration process is rendered as a mixed-integer program to enable scenario partitioning and representative scenario selection. And ex-post problem-driven evaluation indices are proposed to evaluate the SR performance. Numerical experiments show that IPDSR significantly outperforms existing SR methods by achieving an optimality gap of less than 1% within an acceptable computation time.",

      "abstract": "Accurate dynamic models of power plants are essential for Transmission System Operators (TSOs) to assess the security and reliability of the grid operation, especially as the loss of system inertia amplifies the impact of disturbances. Yet, parameterizing these models remains a challenge in deregulated systems due to limited data availability and restricted access to proprietary information. This paper proposes an identification framework for estimating the parameters of grey-box linear state space dynamic equivalents of synchronous machines and their regulators directly from terminal measurements. The method applies a two-step constrained least-squares routine to initialize the system state and subsequently identify the model parameters. Validation is performed on a dynamic IEEE 9-bus test system under different operating conditions, enabling analysis of the identification performance. Convergence tests confirm the method’s consistency against large perturbations to the initial parameter guess. Designed for non-intrusive and online use, the proposed approach provides TSOs with a computationally efficient tool for dynamic model inference and/or validation, and subsequent system security studies.",

      "abstract": "Distribution network reconfiguration (DNR) is a core operational tool in modern distribution grids, enabling fast, topology-based control to reduce losses, improve voltage profiles, and alleviate overloads in the presence of variability introduced by distributed energy resources. This paper proposes a DNR solution based on a new linear model of branch currents when a set of lines is opened simultaneously, integrated into a graphtheoretic framework. With this model, network losses can be estimated for any set of simultaneous line openings, avoiding the need to solve a power-flow for each tree under analysis. The method proceeds in two phases, both leveraging the same linear model: the first obtains a minimum spanning tree from singleopening estimates on the meshed network, thereby obtaining an initial set of candidate branches to open; the second refines that set by evaluating alternative multiple-opening branch sets with the same linear model. With the proposed methodology, only one power-flow solve of the initial meshed network is required. Tests carried out on networks of up to 10 000 nodes show significant reductions in losses and very low execution times, supporting realtime applicability at a scale at which most existing approaches have not been demonstrated.",

      "abstract": "Transmission Expansion Planning (TEP) optimizes power grid upgrades and investments to ensure reliable, efficient, and cost-effective electricity delivery while addressing grid constraints. To support growing demand and renewable energy integration, energy storage is emerging as a pivotal asset that provides temporal flexibility and alleviates congestion. This paper develops a multiperiod, two-stage PTDF formulation that cooptimizes transmission upgrades and storage siting/sizing. To ensure scalability, a trust-region, multicut Benders scheme warmstarted from per-representative-day optima is proposed. Applied to a 2,000-bus synthetic Texas system under high-renewable projections, the method attains final optimality gaps below 2% and yields a plan with storage at 167 nodes (32% of peak renewable capacity). These results demonstrate that the proposed PTDF-based methodology efficiently handles large distributed storage fleets, demonstrating scalability at high spatial resolution.",

      "abstract": "Power system operators need tools for rapid, realtime counterfactual assessments of grid security under fastchanging conditions. Traditional N-1 contingency analysis lacks dynamic evaluation, especially of frequency swings from common faults. This paper introduces a real-time dashboard framework to screen dynamic contingencies. It assumes: (a) the grid starts in a balanced state; (b) faults can occur randomly on any transmission line, temporarily de-energizing and then reconnecting it within about one second; and (c) contingencies are flagged if post-fault transients cause line flows to exceed safety thresholds. The key contributions are: (1) Overload Indicator – a system-wide metric quantifying integrated N-1 dynamic risk from a given state; (2) Scalable Fault Evaluation Algorithm – a linear-scaling method to assess dynamic fault impacts without brute-force simulations; and (3) Risk Estimation – a Cross Entropy Adaptive Importance Sampling method estimating the likelihood of low probability by high risk events, e.g. associated with potential transformer over-current. We demonstrate the framework on the Israeli transmission power grid (IG).",

      "abstract": "Transmission System Operators routinely use transmission switching as a tool to manage congestion and ensure system security. Motivated by sub-transmission operations at RTE, this paper considers the Optimal Transmission Switching with De-energization (OTSD), which captures potential loss of connectivity (and therefore localized blackout) following loss of transmission elements. While directly relevant to real-life operations, this problem has received very little attention in the literature. The paper proposes a new mixed-integer linear programming formulation for OTSD that represents postcontingency loss of connectivity without requiring additional binary variables. This new formulation provides the foundation for a fast, iterative heuristic algorithm. Computational experiments confirms that state-of-the-art optimization solvers struggle to solve the extensive formulation of OTSD, often failing to find even trivial solutions within reasonable time. In contrast, numerical results demonstrate the efficiency of the proposed heuristic, which finds high-quality feasible solutions 100-1000x faster than using Gurobi.",

      "authors": [

      "abstract": "Cascading failures pose significant frequency and voltage stability challenges in Renewable Energy Source (RES)-rich grids, especially when the system unintentionally splits, leading to widespread blackouts. This paper presents a novel method for identifying strategic buses for the deployment of decentralized battery energy storage systems (BESS), enabling islanded-mode operation to support split areas and thereby enhance grid resilience against cascading failures. The method performs risk-aware, budget-constrained optimal BESS allocation that accounts for load/RES uncertainty and worst credible contingencies, while integrating dynamic cascading-failure modelling and analysis to evaluate system-wide performance under BESS-provided grid support. It explicitly considers cascade-triggering mechanisms in frequency, voltage, and line loading—such as RoCoF, frequency nadir, voltage bounds, and thermal limits—together with a budget limit, by incorporating them into the optimization constraints. This enables optimal BESS allocation to mitigate cascading risks and enhance decentralized resilience by providing grid services such as voltage and frequency regulation, while reducing reliance on conventional load shedding, particularly during islanded operation through a virtual synchronous machine (VSM) control scheme. Implemented in the Cypriot power grid, the method demonstrates effectiveness in improving system resilience and reducing unsupplied load by 43.1%.",

      "abstract": "As distributed energy resources (DERs) proliferate, future power system will need new market platforms enabling prosumers to trade various electricity and grid-support products. However, prosumers often exhibit complex, product interdependent preferences and face limited cognitive capacity, hindering participation in prevailing markets with complex structures and bid formats. We address this challenge by introducing a multi-product market that allows prosumers to express complex preferences through an intuitive format, by fusing combinatorial clock exchange and machine learning (ML) techniques. The iterative mechanism only requires prosumers to report their preferred package of products at posted prices, eliminating the need for forecasting product prices or adhering to complex bid formats, while the ML-aided price discovery speeds up convergence. The linear pricing rule further enhances transparency and interpretability. Finally, numerical simulations demonstrate convergence to clearing prices in approximately 15 clock iterations.",

      "abstract": "Aggregation schemes provide a means to reduce the computational complexity of power system operation by reducing the number of devices that are considered individually. This can be achieved with tools of computational geometry, where the feasible set is projected onto the decision variables of the point of interconnection. Set projection is computationally expensive, especially in the context of multi-period power system operation. This calls for efficiency improvements via structure exploitation of set representations. This paper proposes efficient flexibility aggregation via constrained zonotopes. We evaluate the performance of the proposed method on a 15-bus distribution grid with time-dependent elements for up to 96 timesteps. The results suggest that the presented method significantly improves computation times compared to classic polytope projection approaches.",

      "abstract": "Behind-the-meter (BTM) distributed energy resources and flexible electrified loads, such as photovoltaic (PV) systems and heat pumps (HPs), are expanding rapidly, thereby increasing the complexity and uncertainty of the distribution grid. This paper proposes a probabilistic methodology to disaggregate BTM energy components based on a multivariate conditional diffusion model. Leveraging low-frequency (LF) smart meter data and conditioning signals such as irradiance and temperature, the model jointly reconstructs PV generation and HP consumption, distinguishing between domestic hot water and space heating. Evaluated on real residential data from the Netherlands, the methodology demonstrates strong deterministic and probabilistic performance, providing reliable uncertainty estimates across multiple time scales. The model exhibits robustness to reduced training sets, and the impact of seasonality on disaggregation performance is analyzed. By jointly disaggregating BTM PV generation and HP loads while quantifying uncertainty, the proposed approach provides distribution system operators with a practical tool to improve observability, planning, and flexibility management under LF metering constraints.",

      "abstract": "Topology optimization has emerged as a powerful and increasingly relevant strategy for enhancing the flexibility and efficiency of power system operations. However, solving these problems is computationally demanding due to their combinatorial nature and the use of big-M formulations. Optimizationbased bound tightening (OBBT) is a well-known strategy to improve the solution of mixed-integer linear programs (MILPs) by computing tighter bounds for continuous variables. Yet, existing OBBT approaches in topology optimization typically relax all switching decisions in the bounding subproblems, leading to excessively loose feasible regions and limited bound improvements. In this work, we propose a topology-aware bound tightening method that uses network structure to determine which switching variables to relax. Through extensive computational experiments on the IEEE 118-bus system, we find that keeping a small subset of switching variables as binary, while relaxing the rest, strikes a sweet spot between the computational effort required to solve the bounding problems and the tightness of the resulting bounds.",

      "abstract": "The increasing integration of distributed energy resources (DERs) is crucial for power system decarbonization, yet unlocking DERs’ flexibility is challenged by their inherent uncertainties and modelling complexity. As traditional optimization methods struggle with such uncertainty and complexity of DERs, reinforcement learning (RL) has emerged as a promising alternative for DER management. However, standard RL methods suffer from sample inefficiency and sub-optimality when trained from scratch. Inspired by the training paradigms in large language models, this paper proposes a Supervised Reinforcement Learning (SRL) framework for learning DER coordination policies. This framework first pre-trains a policy on demonstration data in a supervised-learning fashion, which is then further fine-tuned using RL. Furthermore, we propose a two-step fine-tuning process: offline fine-tuning for enhancing policy performance and online fine-tuning for adapting it to the real-world dynamics. Experiments demonstrate that RL implementations based on the proposed framework significantly outperform all benchmarks, achieving high cost efficiency even under low-quality demonstration data.",

      "abstract": "As electric vehicles (EVs) become central to decarbonization efforts, the need for uninterrupted power supply in time-critical logistics, particularly in medical transportation, poses unique challenges for power systems integration. Conventional fixed or mobile charging infrastructure requires vehicle downtime, which makes them unsuitable for nonstop operations such as organ delivery. This work introduces the Wireless Mobile Charging Electric Vehicle Routing Problem, a novel framework in which mobile charging trucks wirelessly transfer energy to moving EVs via inductive coupling, eliminating the need for stationary charging stops. We formulate a mixed-integer programming model that co-optimizes routing and in-motion energy transfer between heterogeneous vehicle fleets under temporal and spatial alignment constraints. To address computational complexity, we develop a hybrid Bitmask Dynamic Programming and Large Neighborhood Search algorithm, tailored to arc-level charging decisions and dual-fleet synchronization. Experiments using real-world hospital logistics data from Singapore demonstrate significant runtime improvements and higher-quality solutions compared with commercial solvers. This study advances computational power system modeling by incorporating dynamic, motion-based energy delivery that is both time- and spacedependent. The results provide actionable insights into planning mobile energy infrastructure, enhancing demand-side flexibility, strengthening resilience in emergency logistics, and integrating wireless charging into urban power systems to support flexible and zero-carbon electrified mobility.",

      "abstract": "Analyzing cascading failures in power systems is critical, yet data-driven methods often struggle with explainability due to the intrinsic complexity of their underlying algorithms and their reliance on statistical correlation rather than true causation. To bridge this gap, this work develops a spatiotemporal framework grounded in causal inference. We construct a Structural Causal Model (SCM) that learns the genuine cause-andeffect relationships governing failure propagation using historical observations of previous cascading events. The resulting SCM serves a dual purpose: it acts as a high-fidelity predictive tool to forecast the progression of cascading events and as an explanatory engine that uses causal metrics to uncover the grid’s underlying vulnerability structure. Validation on standard IEEE test systems confirms the model’s superior predictive power and scalability. The framework achieves an accuracy of 97.61% on the IEEE 14-bus system and 84.29% on the IEEE 123-bus case, outperforming established benchmarks. The framework’s explanatory value is demonstrated by its ability to identify and characterize key buses based on their causal roles as failure sources, sinks, or intermediaries. In summary, this research contributes a transparent and robust methodology that enhances both the prediction and comprehension of cascading failures, offering a more actionable tool for improving the resilience of modern power systems.",

      "abstract": "Power systems face increasing weather-driven variability and, therefore, increasingly rely on flexible but energylimited storage resources. Energy storage can buffer this variability, but its value depends on intertemporal decisions under uncertain prices. Without accounting for the future reliability value of stored energy, batteries may act myopically, discharging too early or failing to preserve reserves during critical hours. This paper introduces a stopping-time reward that, together with a state-of-charge (SoC) range target penalty, aligns arbitrage incentives with system reliability by rewarding storage that maintains sufficient SoC before critical hours. We formulate the problem as an online optimization with a chance-constrained terminal SoC and embed it in an end-to-end (E2E) learning framework, jointly training the price predictor and control policy. The proposed design enhances reachability of target SoC ranges, improves profit under volatile conditions, and reduces its standard deviation.",

      "abstract": "Due to their considerable projected installed capacity and rapid deployment time, PEM electrolyzers hold significant potential for participation in the frequency reserve market. Although numerous studies have examined the economic benefits for electrolyzer owners in this market, a comprehensive evaluation of the economic and operational implications of utilizing these devices alongside other reserve providers from a system-wide perspective is a gap in the current literature. Such an analysis is key for guiding policymakers and must account for potential loss of power infeed and associated reserve, diverse hydrogen supply chains, reserve pricing mechanisms, and hydrogen price scenarios. Consequently, this work addresses these factors by using a Mixed Integer Second Order Cone (MISOC) multi-energy unit commitment model that incorporates frequency stability constraints. The results obtained on the GB power system demonstrate that low hydrogen prices and different reserve pricing mechanisms significantly impact system inertia, which does not pose an issue for grid stability if sufficient fast frequency reserve is available. These results further suggest that the proposed 140 GW·s inertia lower bound for the GB system may be an overestimation if the planned electrolyzer projects are realized within the next five years.",

      "abstract": "This paper studies the Structural demand response Program (SP) in Brazil from a consumer’s perspective. We begin by formalizing the SP’s operational and financial mechanisms, and then develop a strategic bidding methodology that follows a twostage decision-making process, formulated as a nonconvex bilevel optimization model. In the first stage, consumers determine optimal bids that balance program revenues with production-related opportunity costs, while the second stage models the all-or-nothing marketclearing process as a Mixed-Integer Linear Programming problem. To address computational challenges posed by the strategic bidding model, the nonconvexities are linearized via binary relations, and the bilevel model is reformulated as an equivalent single-level problem solved via a tailored Column-and-Constraint Generation algorithm. Empirical evidence from a case study based on data from the Brazilian power system and market environment suggests that the SP’s design incentivizes energy-intensive consumers with flexible demand profiles. In contrast, baseline constraints hinder broader participation by priceresponsive consumers.",

      "abstract": "Solving power system capacity expansion planning (CEP) problems at realistic spatial resolutions is computationally challenging. Thus, a common practice is to solve CEP over zonal models with low spatial resolution rather than over full-scale nodal power networks. Due to improvements in solving largescale stochastic mixed integer programs, these computational limitations are becoming less relevant, and the assumption that zonal models are realistic and useful approximations of nodal CEP is worth revisiting. This work is the first to conduct a systematic computational study on the assumption that spatial aggregation can reasonably be used for ISO-scale CEP. By considering a realistic, large-scale test network based on the state of California with over 8,000 buses, we find that well-designed small spatial aggregations can yield good approximations but that coarser zonal models may result in large distortions of investment decisions, e.g., capacity under-investment of up to 41% for the lowest resolution model considered.",

      "abstract": "DC Optimal Power Flow (DCOPF) is widely utilized in power system operations due to its simplicity and computational efficiency. However, its lossless, reactive power–agnostic model often yields dispatches that are infeasible under practical operating scenarios such as the nonlinear AC power flow (ACPF) equations. While theoretical analysis demonstrates that DCOPF solutions are inherently AC-infeasible, their widespread industry adoption suggests substantial practical utility. This paper develops a unified DCOPF→ACPF pipeline to recover AC feasible solutions from DCOPF-based dispatches. The pipeline uses four DCOPF variants and applies AC feasibility recovery using both distributed slack allocation and PV/PQ switching. The main objective is to identify the most effective pipeline for restoring AC feasibility. Evaluation across over 10,000 dispatch scenarios on various test cases demonstrates that the structured ACPF model yields solutions that satisfy both the ACPF equations, and all engineering inequality constraints. In a 13,659-bus case, the mean absolute error and cost differences between DCOPF and ACOPF are reduced by 75% and 93%, respectively, compared to conventional single slack bus methods. Under extreme loading conditions, the pipeline reduces inequality constraint violations by a factor of 3 to 5.",

      "abstract": "This paper presents a dynamic phasor-based statespace modelling framework for modular multilevel converters (MMCs) using multiple dq reference frames (DQsym). The main contribution is the development of a numerically stable statespace solver tailored to multi-dq dynamic phasor models. The solver employs integration and a systematic matrix update mechanism to consistently incorporate switching events within the unified state-space formulation, allowing harmonic interactions and topology changes to be captured without manual reconfiguration. The proposed framework is implemented as a standalone MATLAB/Simulink library to facilitate time-domain simulation and to provide a structured basis for future eigenvalue-based small-signal stability studies. The approach is validated on a point-to-point HVDC system and benchmarked against an EMT model. Results demonstrate that the DQsym-based implementation achieves EMT-level fidelity while maintaining state-space structure suitable for scalable, system-level analysis of converterdominated grids.",

      "abstract": "Transmission expansion planning (TEP) plays a critical role in ensuring power system reliability and facilitating the integration of renewable energy resources. However, this process requires planners to constantly deal with significant uncertainty. While multistage stochastic TEP models provide a robust framework for identifying investment plans under uncertainty, the rapid growth in problem size hinders their computational tractability. To address this challenge, this paper develops a hybrid machine learning-optimisation framework for stochastic TEP. The proposed approach uses investment decisions and uncertainty scenarios as input features to train surrogate neural networks, which are then reformulated as mixed-integer linear constraints and embedded within an optimisation model. The surrogate model approximates expected operational costs to inform TEP decisions, reducing the burden arising from large operational problems. Case study applications on IEEE test systems demonstrate that, after training, the proposed approach achieves near-optimal investment costs while reducing total computational time by up to a factor of around 13 compared to a single full-optimisation stochastic formulation. This enables performing extensive multi-scenario analysis and stress testing that would otherwise be computationally prohibitive at scale.",

      "abstract": "Digital protective relays are the primary protection in most power systems applications and now interface with cyber layers in modern grids, improving observability and control. However, this integration also introduces cybersecurity risks, as digital relays are digital computers, vulnerable to cyberattacks and malicious code. A compromised frequency relay can cause false tripping of generators, transformers, or undesired load shedding, potentially leading to blackouts. This paper presents the development of FPAA-based next-generation static frequency relays (over/under frequency and ROCOF) that are inherently resilient to cyber-attacks. The proposed relay operates in parallel with existing digital frequency relays, enhancing the cybersecurity of current protection systems. It is modelled for the Western Interconnection, compliant with NERC PRC-024-3 standards, and tested under multiple scenarios. Hardware testing is performed using the AN231K04-QUAD FPAA board. Results confirm the relay’s dependability and selectivity, supporting its potential to improve the cyber-resilience of existing frequency protection schemes.",

      "abstract": "This paper investigates probabilistic, data-driven methods for short- to mid-term distribution system state forecasting to support proactive grid operation. We compare multiple forecasting methods that integrate spatial and temporal learning, ranging from baseline models based on standard load profiles to fully integrated spatio-temporal neural networks. In particular, we evaluate the A3T-GCN architecture, which combines graph convolutions, gated recurrent units, and temporal attention for multi-horizon state prediction. Using both synthetic SimBench and real low-voltage grids, we assess deterministic and probabilistic forecast accuracy as well as the capability to anticipate critical operating conditions. Our results show that purely temporal models already achieve competitive forecasting performance, capturing a large share of system dynamics. Explicitly modeling spatial–temporal dependencies improves robustness across networks. Among the evaluated methods, the A3T-GCN achieves the most stable performance across grids and forecasting horizons, demonstrating its potential as a transferable framework for reliable, uncertainty-aware state forecasting in future distribution systems.",

      "abstract": "This paper presents a new scalable geospatial method for estimating substation service areas to allocate electrical demand and distributed generation using publicly available datasets. The approach is inspired by the classical Watershed spreading concept and applies an optimized cost-distance propagation framework implemented using Dijkstra’s algorithm, incorporating geographic features, infrastructure, land use, administrative boundaries, and established grid planning practices. The resulting service areas provide a stable spatial framework for allocating demand and generation while remaining adaptable to grid evolution and new substation deployments. Electrical demand is derived from demographic and land-use data, and generation units are mapped using public registries. Exemplary validation against German 110 kV Distribution System Operator (DSO) service area maps demonstrates that the new method reduces spatial error by 9% compared to the classical Voronoi-based approach. The proposed method enables the first high-spatial-resolution, systematic, open-data-based estimation of substation service areas in Germany, where public substation boundaries are not available.",

      "abstract": "Achieving urban net-zero targets requires coordinated planning across electricity, heating, and gas systems while managing renewable supply and loads uncertainties. We present a co-planning framework integrating building-scale renewable energy hub optimization (REHO) with power grid’s distributionlevel energy storage systems (ESSs) allocation and line reinforcement (LR). The building layer uses REHO to generate Pareto-optimal PV and net load profiles. The grid layer cooptimizes ESSs and LRs via a second-order cone optimal power flow relying on the Benders decomposition. Validation on a Swiss urban system with 2,000 buildings demonstrates ESS and LR deployment cost reductions of 43.4% (2030), 38.2% (2040), and 34.1% (2050) versus a standard reactive planning. The framework deploys 6 MWh ESS and reinforces 15 lines, enabling PV growth from 2.9 MW to 27.7 MW while phasing out 762 oil boilers and reducing emissions by 53.6% by 2050, aligned with local utility’s net-zero targets. The approach uses standard solvers and scales to large networks, offering a practical pathway for urban energy system operators and municipalities to coordinate planning across sectors.",

      "abstract": "The increasing share of converter-based resources in power systems calls for scalable methods to analyse stability without relying on exhaustive system-wide simulations. Decentralized small-gain and small-phase criteria have recently been proposed for this purpose, but their applicability to grid-forming converters is severely limited by the sectoriality assumption, which is not typically satisfied at low frequencies. This work revisits and extends mixed gain–phase conditions by introducing loop-shaping transformations that reformulate converter and network models in alternative coordinate frames. The proposed approach resolves intrinsic non-sectoriality at low frequencies and reduces conservativeness, thereby improving the applicability of decentralized stability certification. Analytical results are illustrated using an infinite bus system first and then extended to the IEEE 14-bus network, demonstrating the practicality and scalability of the method. These findings provide a pathway toward less conservative and more widely applicable decentralized stability certificates in power grids.",

        "Giorgio Giannuzzi"

      "abstract": "Monitoring electromechanical oscillations and islanding is crucial for ensuring the stability of modern power systems, particularly with the increasing penetration of inverterbased resources. Existing model-based and data-driven methods have shown potential but face challenges in robustness and computational efficiency, limiting their real-time application in TSO’s control rooms. This study proposes a novel data-driven approach for detecting electromechanical oscillations and network islanding in large-scale power systems. The method leverages only streaming frequency measurements from Phasor Measurement Units (PMUs) and employs advanced techniques, including Model Order Reduction technique and clustering algorithm such as Hierarchical Agglomerative Clustering. This enables the identification of disconnected network areas or coherent oscillatory regions with high accuracy, robustness, and computational efficiency. The approach is validated through real-world case studies in the European grid, including normal operation, the 2021 Continental Europe Synchronous Area separation, and the December 2016 oscillatory event. Results confirm its suitability for real-time stability monitoring.",

      "abstract": "This paper proposes a framework for real-time management of distributed energy resources in low-voltage networks. It is based on the combination of a decentralized predictive control strategy, enabling local cost minimization, and a centralized online feedback optimization, which adjusts the nodal setpoints to manage low-voltage networks. The proposed approach relies on nodal computation of available flexibility using multiparametric optimization, accounting for forecasts of load, photovoltaic generation, and electricity price. This results in control policies and cost functions that reflect the timevarying value of active and reactive power flexibility. At the central level, an online feedback controller optimizes power flows, requiring only real-time voltage measurements and aggregated local information. This eliminates the need to share complete cost functions, enhancing prosumers’ privacy. The resulting approach allows for cost-effective control of power systems by prioritizing low-cost flexibility. The method is tested on three low-voltage networks of 5, 20 and 43 buses by comparing it with existing relevant techniques.",

      "abstract": "With the increasing frequency of natural disasters that cause damage to power systems, significant challenges arise in the detection, isolation, and restoration of faults. While the research community focuses on dispatching repair crews, less attention has been given to inspection crews, responsible for identifying the location and nature of faults. This paper proposes a dynamic bi-objective model for dispatching inspection crews, aiming to minimize routing efforts while prioritizing areas with higher fault probabilities. Posterior fault probabilities are estimated through Bayes’ theorem and updated dynamically as new faults are identified. The proposed framework also integrates a dynamic decision-making process, allowing weight adjustments whenever new routing is required. Results demonstrate that the model generates non-convex Pareto fronts, showing the advantage of multi-objective optimization techniques such as the ϵ-constraint method. Numerical experiments on the IEEE-34 test system demonstrate that dynamically adjusting decision weights leads to substantial improvements in fault detection time in the scenario considered.",

      "abstract": "The widely accepted definition of grid-forming (GFM) inverter states that it should behave as a (nearly) constant voltage source behind an impedance by maintaining a (nearly) constant internal voltage phasor in the sub-transient to transient time frame. Some system operators further mandate permissible ranges for this effective impedance. However, these specifications do not clearly define the location of the internal voltage source, and no systematic method exists to quantify its effective impedance for a black-box GFM model. To address this, we first compare the transient responses of an ideal voltage source and a GFM to show that an idealistic GFM maintains a (nearly) constant voltage across the filter capacitor, rather than at the inverter switches. Then we propose a systematic method to quantify the effective impedance of a GFM from its black-box model using frequency-domain admittance plots. Using standard PSCAD GFM models developed by NLR (formerly NREL), we demonstrate that the GFM’s equivalent impedance model captures the sub-transient response and static voltage stability limit accurately. Further, replacing the GFM with the proposed equivalent circuit model in the modified IEEE-39 bus system is shown to reproduce the small-signal stability characteristics with reasonable accuracy.",

      "abstract": "We introduce a deep learning surrogate approach, built on free, open-source data and tools, to predict transformer demand time series under future decarbonization with sector coupling scenarios for any German low-voltage grid. This work directly addresses the current research landscape of opaque national studies, unverifiable or imprecise modeling decisions, and privileged access to real grid data. First, a state-of-theart, scalable, ground-truth generation tool was developed, which replicates physical grids and populates them with harmonized time series data. This tool generated a representative dataset of 1,000 low-voltage grids for training a transformer architecturebased surrogate intended to replace expensive energy system optimization models. The surrogate reduces computation time by three orders of magnitude, while maintaining peak load prediction errors below 10% for the majority of our grids. With this surrogate, bottom-up results for all 500,000 low-voltage grids in Germany can be obtained within approximately 5 days of computation time.",

      "abstract": "In this work, we address the optimal energy trading (OET) problem in distribution grids with a large number of prosumer households. We first introduce a clustering architecture that partitions the grid into residential prosumer clusters (RPCs), each managed by an aggregator responsible for internal energy coordination and external interactions with neighbouring clusters and the distribution system operator. To optimize energy exchanges within and across clusters, we develop a novel decentralized control framework based on graphon mean field game theory. This framework models the OET as a decentralized dynamic game, deriving optimal control strategies that minimize each prosumer’s individual energy cost. Household dynamics and cost functions are influenced by both local aggregate effects within their RPC and global interactions across interconnected clusters. Numerical experiments conducted on a dense energy network with 100 clusters, each containing 200 uniform households, validate the effectiveness of the proposed method in achieving scalable and cost-efficient energy coordination.",

      "abstract": "This paper presents a new variable time-step method for the electromagnetic transient (EMT) simulation of power systems. Trapezoidal discretization with a constant time-step is commonly employed in EMT simulations of power systems. During an EMT simulation, power systems typically encounter high-frequency transients that demand small time-steps for accuracy, as well as low-frequency and steady-state conditions that allow larger time-steps for efficiency. With a fixed time-step, either the simulation accuracy or speed is compromised, and achieving a trade-off is not feasible for all cases. Consequently, this paper proposes a novel variable time-step strategy for maintaining both simulation accuracy and speed. The performance of the proposed method is verified through the WECC 240-bus system.",

      "authors": [

      "abstract": "Hosting Capacity (HC) Assessments for Distributed Generation (DG) have been typically carried out using Monte Carlo simulations to cater for different uncertainties, such as, DG sizes and locations, and load consumption patterns. However, their computational cost limits its widespread practical application over real combined unbalanced medium voltage and low voltage (MV-LV) networks. This paper proposes a Statistical Distribution Analysis-based methodology that allows determining a sufficient number of Monte Carlo simulations for HC quantification. This is achieved using a permutation-based analysis for statistical representativeness while mitigating order bias, and employing machine learning (XGBoost) with model explainability (SHAP) to rank the key physical predictors of overvoltage, the most restricting operational constraint in networks with large DG penetration levels. The methodology is demonstrated in a large Chilean MV-LV network with more than ten thousand customers. Here, results show that a range between 100-200 simulations are sufficient for statistical representativeness under tested error thresholds. Moreover, while network topology metrics consistently dominate, the relevance of photovoltaic (PV) power ratings significantly increases at higher penetration levels. These insights prove restrictive scenarios have identifiable signatures, providing a data-driven foundation for “Physics-Informed” generation of Monte Carlo scenarios, allowing reducing simulation counts and, therefore, computational cost.",

        "Kyri Baker"
      ],
      "abstract": "This paper proposes a residual learning framework that bridges the gap between DC and AC Optimal Power Flow (OPF) formulations. While DC-OPF provides a tractable and simplified linear approximation, it neglects nonlinear AC effects such as voltage magnitude, reactive power, and losses, resulting in infeasible operating points. To overcome this limitation, we introduce a topology-aware local-attention Graph Neural Network that learns the residual corrections required to map DC-OPF solutions to their AC-feasible counterparts. The framework integrates DC features at both the local and global levels and employs a physics-aware loss function enforcing AC power-flow feasibility and operational limits. Using the OPFData benchmark across the IEEE 57, 118, and GOC 2000-bus systems, the proposed model achieves up to 25% reduction in MSE, 3× improvement in AC-feasibility distance, and order-of-magnitude runtime gains compared to AC-OPF solvers, while maintaining robustness under N−1 contingencies. The results highlight residual learning as an effective paradigm for accelerating AC-feasible optimal power flow computation and enabling near real time operational decision making.",

      "abstract": "Electric vehicles (EVs) in Vehicle-to-Grid (V2G) systems act as distributed energy resources that support grid stability. Centralized coordination such as the extended State Space Model (eSSM) enhances scalability and estimation efficiency but may introduce new cyber-attack surfaces. This paper presents a stealthy False Data Injection Attack (FDIA) targeting eSSM-based V2G coordination. Unlike prior studies that assume attackers can disrupt physical charging or discharging processes, we consider an adversary who compromises only a subset of EVs, and limiting their influence to the manipulation of reported State of Charge (SoC) and power measurements. By doing so, the attacker can deceive the operator’s perception of fleet flexibility while remaining consistent with model-based expectations, thus evading anomaly detection. Numerical simulations show that the proposed stealthy FDIA can deteriorate grid frequency stability even without direct access to control infrastructure. These findings highlight the need for enhanced detection and mitigation mechanisms tailored to aggregated V2G frameworks.",

      "abstract": "As converter-based generation becomes increasingly dominant, Grid-Forming (GFM) control plays a key role in regulating voltage and frequency. While various strategies have been proposed to improve GFM performance under large disturbances, most of them focus on balanced conditions. This work presents a direct Voltage Control GFM (VCGFM) that enhances the large disturbance stability under unbalanced scenarios. Building on a virtual power-based method previously validated in balanced cases, the VCGFM is extended to integrate a negative sequence control. A current limitation scheme is introduced to limit both positive and negative sequence currents. The proposed control is validated through numerical simulations and experimental tests under diverse balanced and unbalanced grid disturbances. The method aims to preserve the voltage-source behavior of the VCGFM while maintaining synchronization and limiting currents during severe asymmetrical faults.",

      "abstract": "Voltage (Volt) and reactive-power (VAR) control in transmission networks is critical for reliability and increasingly needs fast, implementable decisions. This paper presents a transmission Volt/VAR Optimization (VVO) framework that cooptimizes discrete control of on-load tap-changing transformers (OLTCs) and capacitor banks (CBs) with AC power flow (ACPF) physics to improve voltage stability and minimize VAR generation. The framework follows a relax–round–resolve pipeline: a continuous relaxation proposes targets, a rounding step selects feasible discrete settings, and a final solve enforces AC power f low physics. Extensive experiments on IEEE, PEGASE, and RTE systems show consistent improvements in voltage and VAR quality metrics with modest generator redispatch while preserving economic operation and achieving compatible runtimes with real-time transmission operations.",

      "id": "444",
      "title": "AC Dynamics-aware Trajectory Optimization with Binary Enforcement for Adaptive UFLS Design",
      "authors": [
        "Muhammad Hamza Ali",
        "Amritanshu Pandey"
      ],
      "abstract": "The high penetration of distributed energy resources, resulting in backfeed of power at the transmission and distribution interface, is causing conventional underfrequency load shedding (UFLS) schemes to become nonconforming. Adaptive schemes that update UFLS relay settings recursively in time offer a solution, but existing adaptive techniques that obtain UFLS relay settings with linearized or reduced-order model formulations fail to capture AC nonlinear network behavior. In practice, this will result in relays unable to restore system frequency during adverse disturbances.We formulate an adaptive UFLS problem as a trajectory optimization and include the full AC nonlinear network dynamics to ensure AC feasibility and time-coordinated control actions. We include binary decisions to model relay switching action and time-delayed multi-stage load-shedding. However, this formulation results in an intractable MINLP problem. To enforce model tractability, we relax these binary variables into continuous surrogates and reformulate the MINLP as a sequence of NLPs. We solve the NLPs with a homotopy-driven method that enforces near-integer-feasible solutions. We evaluate the framework on multiple synthetic transmission systems and demonstrate that it scales efficiently to networks exceeding 1500+ nodes with over 170k+ continuous and 73k+ binary decision variables, while successfully recovering binary-feasible solutions that arrest the frequency decline during worst-case disturbance.",

      "abstract": "Three-phase optimal power flow (OPF) is a foundational mathematical optimization problem for power advanced distribution network management. In this work we study the application of nonlinear programming algorithms to a variety of state-of-the-art mathematical optimisation models for distribution OPF with 3×3 impedances on a library of 128 LV networks. We study numerical performance in terms of wall clock time as well as robustness. Specifically, we study a variety of voltage angle constraints, bounds and initialisation strategies that influence the performance significantly. Contrary to what has been observed for transmission networks, the power-voltage (polar) formulation is not necessarily the best formulation, and current-voltage is generally very competitive. We observe that power bases for per unit conversion need to be chosen small enough (≤1000kW) to avoid inaccuracies. Numerical studies are performed for a set of 128 LV networks, using Ipopt and KNITRO.",

      "abstract": "This paper introduces Rich Information Markets (RIM), replacing scalar quantity-price bidding with multidimensional feasible region offers that preserve complete operational constraint sets. Four bid types are formulated: Capability-Constrained (CCB), Profile-Constrained (PCB), State- Based (SBB), and Storage Capability (SCB), maintaining MILP tractability. The proposed bidding model is validated across 34 scenarios (9 operational contexts and 25 market-scale configurations), RIM achieves up to 42.6% welfare improvement over the best quantity-price baseline, while market acceptance rates remains comparable. The key differentiator is constraint fidelity: on a dedicated mixed-composition bid types scenario, RIM enforces 100% of declared constraints versus 2.5–10.9% violation rates for quantity-price baselines, with failures dominated by PCB profile-sequence and SCB fill-level violations. RIM clearing prices are lower and more stable, free from artificial scarcity caused by infeasible dispatches. Finally, analysing constraint-geometry richness across different bid types shows that market efficiency is driven by the topology of the constraint space rather than by the amount of raw information.",

      "abstract": "This paper analytically investigates the key properties of large-signal strength at the grid connection point of generation/storage technologies, focusing on their capability to maintain grid synchronism following severe disturbances. We define conditions where the technology can maintain 1) its terminal voltage magnitude, 2) synchronism, and 3) its power exchange with the grid within its power transfer limit. These conditions are represented by boundaries related to a proper voltage-behind-an-impedance (VBAI) response. Specifically, we first identify variables that represent the generation/storage technology’s dynamic behavior in relation to each key VBAI property. We employ contraction analysis to derive explicit boundary conditions for the perturbed variables, guaranteeing exponential convergence between trajectories. Simulation results for a synchronous generator validate the proposed method performance, confirming that remaining within the derived region ensures exponential convergence to the steady-state point following large disturbances, while results for a grid-following inverter provide insights into the importance of the phase-locked-loop control coefficient values. The derived conditions serve as a proxy for system operators in identifying stable operational regions for connecting new assets.",

      "abstract": "Estimating generation costs from observed electricity market data is essential for market simulation, strategic bidding, and system planning. To that end, we model the relationship between generation costs and production schedules with a latent variable model. Estimating generation costs from observed schedules is then formulated as Bayesian inference. A prior distribution encodes an initial belief on parameters, and the inference consists of updating the belief with the posterior distribution given observations. We use balanced neural posterior estimation (BNPE) to learn this posterior. Validation on the IEEE RTS-96 test system shows that marginal costs are recovered with narrow credible intervals, while start-up costs remain largely unidentifiable from schedules alone. The method is benchmarked against an inverse-optimization algorithm that exhibits larger parameter errors without uncertainty quantification.",

      "abstract": "Advanced distribution management systems (ADMS) increasingly rely on smart inverter (SI)-based resources for voltage regulation and optimization in modern distribution grids. However, conventional Volt–Var (Q–V) droop settings prescribed by IEEE-1547 remain static, limiting adaptive coordination and often resulting in unfair photovoltaic (PV) curtailments. This paper proposes a fairness-aware and adaptive optimization model to determine SI Volt–Var droop settings with variable breakpoints, ensuring IEEE 1547 compatibility within a multi-period distribution optimal power flow (DOPF) formulation. The framework builds upon an established Current–Voltage AC Optimal Power Flow (IVACOPF) model and introduces new power loss constraints to enhance accuracy. The framework supports fairness-aware curtailment policies, including egalitarian, proportional, and priority-based schemes, with the latter reformulated to eliminate conditional expressions for solver compatibility. Simulations on a modified 33-bus feeder with 15-minute resolution profiles and hourly breakpoint updates demonstrate significant improvements in voltage regulation and reactive power control. The model converges within four minutes, making it suitable for operational use.",

      "abstract": "The identification of dq-asymmetric impedances presents a challenging estimation problem due to the strong crosscoupling between axes, which is especially prominent at low frequencies. Conventional identification schemes are often hampered by the requirement for sequential perturbations or the difficulty of selecting appropriate global parametric models. This paper introduces an active non-parametric frequency-domain approach that utilizes complex transfer functions and local parametric approximations. This formulation eliminates the requirement for periodic steady-state measurements while providing precision comparable to that of correctly specified parametric models. By solving localized linear least-squares problems, the approach maintains high computational efficiency while remaining agnostic to the specific grid structure. Electromagnetic transient (EMT) simulations demonstrate that the proposed method achieves highfidelity identification with a 1 Hz frequency resolution using only one second of noise-corrupted measurements. The results confirm a significant reduction in measurement time compared to available techniques. Additionally, the approach shows superior robustness against model-order selection errors, ensuring accurate wideband modelling of grid dynamics.",

      "abstract": "Distributed energy resources (DERs) are transforming power networks, challenging traditional operational methods, and requiring new coordination mechanisms. To address this challenge, this paper introduces SecuLEx (Secure Limit Exchange), a market-based paradigm for allocating and trading power injection and withdrawal limits, known as dynamic operating envelopes (DOEs). Under this paradigm, distribution system operators (DSOs) first assign initial DOEs to customers through a fair allocation mechanism. These limits can be exchanged afterward through a market, allowing customers to reallocate them according to their needs while ensuring network operational constraints. We formalize SecuLEx and illustrate DOE allocation and market exchanges on a small-scale low-voltage (LV) network. In this case study, SecuLEx reduces renewable curtailment and improves grid utilization and social welfare compared to traditional approaches.",

      "abstract": "The integration of stochastic renewable energy sources has made flexibility aggregators crucial for power system balancing, yet the uncertainty they introduce challenges system security and market efficiency. Current trends show a move towards probabilistic reliability rules for bid qualification, but a key research gap remains: how can a Transmission System Operator (TSO) optimally set these reliability thresholds while considering competitive aggregators in the market? This paper proposes a novel methodology using a Strengthened Faster Linear Approximation (SFLA) to reformulate the game-theoretic problem, which includes lower-level distributionally robust joint chance constraints, into a tractable single-level optimization problem. A case study with real-world data from Spanish Reserve Markets demonstrates the method’s ability to balance system costs and security, quantifying the trade-off between reserve procurement and delivery risk. This research provides TSOs with a computationally tractable decision-making tool to set reliability thresholds for aggregators while ensuring security.",

      "abstract": "As power systems integrate higher shares of variable renewable energy, balancing supply and demand across different timescales becomes increasingly challenging. Historically, reserves procured per time interval have helped power system operators maintain that balance. Per-interval procurement can compromise reliability when reserves are sourced from energylimited resources. This article compares, for the first time, two solutions: (a) a set of constraints, termed envelopes, which uses a per-interval estimate of reserve energy intensity and calculates the cumulative impact of reserve activation on stored energy as the sum of per-interval impacts and (b) a product existing in the literature, called energy reserves, which procures reserves for periods, with durations ranging from a single interval to the model horizon. For the IEEE RTS-GMLC 2019 system, the latter approach, at an increased computational burden, produces more cost-effective day-ahead schedules by allowing resources, including storage, to determine the energy intensity of the reserves provided.",

      "abstract": "Grid-forming voltage source converters (GFMVSCs) play a crucial role in the stability of power systems with large amounts of converter-based generation. Transient stability (angle stability under large disturbances) is a critical limiting factor in stressed power systems. Previous studies have proposed control strategies for GFM-VSCs to improve transient stability. These approaches typically rely on suitable current-limiting algorithms, voltage/reactive-power and active-power supplementary control strategies. This paper investigates and compares the effectiveness of three active-power control strategies in GFMVSCs to enhance transient stability in power systems with 100 % converter-based generation: (i) a wide-area control strategy (TSPWACS) using the centre of inertia (COI) frequency, (ii) a local transient damping method (TSP-TDM), and (iii) a novel local control strategy (TSP-L) proposed in this work. All strategies were implemented and assessed using short-circuit simulations on Kundur’s two-area test system with 100% GFM-VSC generators, demonstrating critical clearing time (CCT) improvement. The TSP-WACS strategy achieves the best performance but requires a communication infrastructure, while TSP-L strategy offers a simple, robust alternative using only local measurements.",

      "abstract": "Existing or planned power grids need to evaluate survivability under extreme events, like a number of peak load overloading conditions, which could possibly cause system collapses (i.e. blackouts). For realistic extreme events that are correlated or share similar patterns, it is reasonable to expect that the dominant vulnerability or failure sources behind them share the same locations but with different severity. Early warning diagnosis that proactively identifies the key vulnerabilities responsible for a number of system collapses of interest can significantly enhance resilience. This paper proposes a multiperiod sparse optimization method, enabling the discovery of persistent failure sources across a sequence of collapsed systems with increasing system stress, such as rising demand or worsening contingencies. This work defines persistency and efficiently integrates persistency constraints to capture the “hidden” evolving vulnerabilities. Circuit-theory based power flow formulations and circuit-inspired optimization heuristics are used to facilitate the scalability of the method. Experiments on benchmark systems show that the method reliably tracks persistent vulnerability locations under increasing load stress, and solves with scalability to large systems (on average taking around 200 s per scenario on 2000+ bus systems).",

      "abstract": "The growing interdependence between integrated electricity and gas systems (IEGS) calls for planning methods that capture their coupled long-term uncertainties and operational interactions. This paper develops a multi-stage stochastic framework for assessing the interplay of IEGS in expansion planning under uncertainty, leveraging a scalable Column Generation and Sharing (CG-S) solution strategy to tackle computational challenges. The model jointly optimises investments in electricity transmission and generation, as well as natural gas (NG) processing facilities, under uncertainty in NG availability and prices, electricity demand growth, and capital costs. It integrates detailed hourly power system operations and daily gas flows, preserving realistic temporal granularity. Case studies on the Australian East Coast Energy System demonstrate that the CG-S algorithm reduces convergence times by up to 45% while maintaining stable memory use. The proposed planning framework enables the identification of a coherent pathway for strategic, coordinated investments across integrated electricity and gas systems, while uncoordinated deterministic practices risk oversizing early generation investments by up to 55% due to the inability to leverage cross-system synergies.",
