      "abstract": "The growing integration of renewable energy resources and flexible loads has introduced new dynamics into modern power systems, resulting in an increased occurrence of oscillatory disturbances. Among them, forced oscillations (FO), caused by periodic disturbance, can propagate widely and compromise system stability. Rapid and accurate localization of oscillation sources is therefore critical. Data-driven methods for oscillation analysis have shown considerable promise. Their development and validation remain constrained by the scarcity of well-documented field-recorded events. They are most often shared anonymously within the research community, making it challenging to study and analyze diverse forced oscillation scenarios. To address this gap, this paper presents three key contributions. First, develop a comprehensive, publicly accessible, time-stamped FO dataset library using realistic power grid models to leverage event availability across a wide range of FO frequencies, magnitudes, and source types. Second, analyze three well-known FO source location methods, namely, the Amplitudebased method, the Dissipation Energy Function Method, and the Cross power spectral density method, using the proposed extensive FO dataset library. Lastly, a Long Short-Term Memory supervised machine learning model was trained and tested that operates independently of power system topology and demonstrates its performance in comparison to traditional physics based methods for FO source location.",

      "abstract": "Fault ride-through capabilities are essential for gridforming (GFM) inverters, particularly for providing ancillary services such as fault reactive current injection and phase jump active power delivery. Conventional GFM controllers, often based on cascaded voltage-current control structures, involve complex designs, require meticulous parameter tuning, and complicate analysis. To address these issues, we previously introduced a hybrid strategy that switches between GFM and current controllers. However, while this approach effectively limits current magnitude during grid disturbances, it fails to preserve the crucial voltage angle-forming characteristic adequately. This paper extends this hybrid strategy with a controller designed to maintain the voltage angle-forming characteristic while concurrently limiting the current magnitude. This integrated approach facilitates the independent design of the GFM and current controllers and ensures the delivery of ancillary services mandated by grid codes. Numerical simulations of a single-phase synchronous inverter during grid disturbances verify the effectiveness of the proposed controller.",

      "abstract": "We propose a scalable two-stage stochastic planning framework for siting and sizing of renewables-based distributed generators using a separable projective approximation routine. The framework learns a separable approximation of the value function from the sample subgradient information. An efficient analytical procedure is developed to compute bounds that assess the quality of the obtained solutions. Efficiency of the framework is demonstrated on IEEE 123-bus and 9500-node distribution systems. Results show that the framework provides high-quality solutions with an optimality gap below 1% in most instances, while reducing computation time by one to two orders of magnitude compared to extensive formulations (EF) and progressive hedging (PH) algorithms. Furthermore, the learned value function enables rapid sensitivity analysis over varying planning parameters by solving each optimization problem within seconds, requiring only 0.006% to 2.2% of the computation time of EF and PH while maintaining comparable solution quality. This substantial reduction in computational complexity makes the framework suitable for large-scale systems without the need for high-performance computing resources.",

      "abstract": "This paper investigates the vulnerability of the Alternating Direction Method of Multipliers (ADMM) algorithm to shared data manipulation. Deliberate data manipulation may cause the ADMM algorithm to converge to suboptimal solutions. We derive a sufficient condition for detecting data manipulation based on the theoretical convergence trajectory of the ADMM algorithm. We evaluate the performance of the detection condition on three data manipulation strategies with various levels of complexity and stealth. The simplest attack sends the target values in each iteration, the second attack uses a feedback loop to find the next target values, and the last attack uses bilevel optimization to find the target values. We then extend the three data manipulation strategies to avoid detection by the proposed detection methods. We also propose an adversarial neural network training framework to detect shared data manipulation. We demonstrate the performance of our data-manipulation strategy and detection framework on optimal power flow (OPF) problems. The results show that the proposed detection condition successfully detects most of the data manipulation attacks. However, the bilevel optimization attack strategy that incorporates the detection methods may avoid detection. Countering this, our proposed adversarial training framework detects all instances of the bilevel optimization attack.",

      "abstract": "Aggregators of consumer energy resources (CERs) like rooftop solar and battery energy storage (BES) face challenges due to their inherent uncertainties. A sensible approach is to use stochastic optimization to handle such uncertainties, which can lead to infeasible problems or loss in revenues if not chosen appropriately. This paper presents three stochastic optimization methods: risk-neutral, robust, and chance-constrained, to address the impact of CER uncertainties for aggregators who participate in energy and regulation services markets in the Australian National Electricity Market. Furthermore, these methods utilize the flexibility of BES, considering precise stateof- charge dynamics and complementarity constraints, aiming for scalable performance while managing uncertainty. The problems are formed as two-stage stochastic mixed-integer linear programs, with relaxations adopted for large scenario sets. The solution approach employs scenario-based methodologies and affine recourse policies to obtain tractable reformulations. These methods are evaluated in terms of profit and constraint violation risk across use cases reflecting diverse operational and market settings, uncertainty characteristics, and decisionmaking preferences, offering aggregators insight into the selection of appropriate methods. Numerical results indicate that, while stochastic methods outperform traditional deterministic methods in terms of profit and risk, the risk-neutral method performs best when uncertainty is correctly captured, whereas robust and chance-constrained methods are more effective when uncertainty is misspecified.",

      "abstract": "Small-signal stability assessment and monitoring in converter-dominated grids can be performed using frequencyresponse (FR) data that can be acquired online with minimal perturbation. This paper applies complementary binary codes as excitations for simultaneous multi-input multi-output (MIMO) frequency scanning. These codes are also referred to as Golay- Rudin-Shapiro (GRS) sequences, after their inventors. We exploit their complementary autocorrelation and composite spectral flatness to derive a correlation- and cross-spectral FR estimator, and include a guard interval to capture the impulse-response tail during admittance estimation. Hadamard modulation preserves complementarity and yields orthogonal channels for MIMO identification. A unified simulation framework benchmarks GRS against the more common pseudorandom binary sequences and multisines under identical constraints, such as injection time, signal energy and realistic noise levels. Accuracy and efficiency are compared using the log-integrated normalized mean square error (NMSE) and computation time. The admittance estimation is demonstrated for three systems including different passive networks with background harmonics and a power converter. The proposed GRS approach consistently shows comparable or better metrics with less injected energy. Therefore, these features, combined with its DSP-friendly implementation and short injection time, make GRS a practical and efficient solution for online FR acquisition and system monitoring.",

      "abstract": "Renewable power-to-hydrogen (ReP2H) systems have emerged as an effective solution for local renewable consumption, but their economic scheduling remains challenging. On one hand, the nonlinear efficiency of electrolyzers introduce strong nonconvexities into the optimization problem. On the other hand, ensuring reliable operation of low-inertia ReP2H systems requires enforcing nonlinear transient frequency-security constraints, which significantly increase computational complexity. To address these challenges, this paper proposes a novel frequency-constrained scheduling framework tailored for ReP2H systems based on selfsupervised learning (SSL). A deep neural network (DNN)-based frequency dynamics surrogate (FDS) is first developed and trained through an accelerated structure function-enhanced training strategy, which balance the high predictive accuracy and training efficiency under limited budgets of labeled data generation. The trained FDS is then embedded within an SSL-based primal–dual learning SSL (PDL-SSL) optimization framework, where the primal and dual DNNs are jointly trained to learn a scheduling proxy that preserves the nonlinear dynamics of electrolyzers and allows end-to-end training without relying on pre-solved optimal decisions. Finally, case studies on 14-node and 33-node ReP2H systems demonstrate that the proposed method achieves nearoptimal scheduling results while satisfying frequency-security constraints with substantially reduced computation time.",

      "abstract": "The rapid proliferation of aggregated flexible resources in active distribution systems (ADSs) calls for accurate estimation of the flexibility area (FA) at the transmission system operator–distribution system operator (TSO–DSO) interface to improve operational coordination. Meanwhile, voltage control plays a critical role in maintaining both economic and secure grid operation. However, the relationship between voltage control parameters and the FA metric is highly nonlinear and analytically intractable, as inverter droop coefficients and other control parameters interact with network constraints and distributed energy resource (DER) operating conditions in a coupled manner. To address this challenge, this paper proposes a Bayesian optimization (BO)-based framework that systematically tunes voltage support parameters to maximize the FA potential. The main contributions are threefold: (1) a cross-layer optimization paradigm that links inverter-level droop control with systemlevel FA characteristics, revealing how voltage control curves shape interface power flow dynamics; (2) a reformulated FA estimation process in which the Interval-Constrained Power Flow (ICPF) model, embedded with droop-control operations, is cast as a Bayesian black-box problem solved efficiently via Gaussian process surrogates with a tile-coding kernel; and (3) a composite performance index, namely the Secure Area–Cost Flexibility (SeCoF), which jointly quantifies the trade-off between flexibility enhancement and operational cost. Case studies on modified IEEE 13-bus and IEEE 37-bus distribution systems demonstrate the effectiveness, robustness, and scalability of the proposed method in improving both technical flexibility and economic performance under realistic operational constraints.",

      "abstract": "The high penetration of Inverter-Based Resources (IBRs) necessitates computationally intensive ElectroMagnetic Transient (EMT) simulations to analyze controller interactions. A practical challenge is that these studies are considerably time-consuming for large systems, and need to be done for different operating conditions and contingencies. Reducing the order of the model to form a reduced-order equivalent is a viable approach to speed up the simulation. In such models, it is important to ensure that (a) the reduced order model is accurate over a wide range of frequencies, and (b) the equivalent system is passive to reduce the chance of instability of the simulation. To address this issue, this paper presents a novel, passivity preserving model order reduction framework that achieves wideband accuracy. The proposed approach extends the classical moment-matching approach to match the system’s response at multiple frequency points to construct a passivity-preserving reduced-order model. The efficacy of the proposed technique is validated on the IEEE 39-bus system. Results demonstrate that the reduced models provide high fidelity over a wide frequency range, enabling a significant reduction in EMT simulation time without compromising the stability of the simulation.",

      "abstract": "The optimal power flow (OPF) is a multi-valued, non-convex mapping from loads to dispatch setpoints. The variability of system parameters (e.g., admittances, topology) further contributes to the multiplicity of dispatch setpoints for a given load. Existing deep learning OPF solvers are single-valued and thus fail to capture the variability of system parameters unless fully represented in the feature space, which is prohibitive. To solve this problem, we introduce a diffusion-based OPF solver, termed DiffOPF, that treats OPF as a conditional sampling problem. The solver learns the joint distribution of loads and dispatch setpoints from operational history, and returns the marginal dispatch distributions conditioned on loads. Unlike single-valued solvers, DiffOPF enables sampling statistically credible warm starts with favorable cost and constraint satisfaction trade-offs. We explore the sample complexity of DiffOPF to ensure the OPF solution within a prescribed distance from the optimizationbased solution, and verify this experimentally on power system benchmarks.",

      "abstract": "Fast charging stations (FCSs) for electric vehicles (EVs), particularly those with integrated functionalities such as vehicle-to-grid (V2G) and embedded energy storage systems, represent a rapidly growing area in both research and industry. These advanced FCSs can provide ancillary services to support grid stability during disturbances. To enable such functionalities while ensuring robust and future-proof operation, control strategies must accommodate diverse and often complex operational requirements. In this context, grid-forming control has emerged as a promising alternative to conventional gridfollowing approaches, especially under weak grid conditions. Furthermore, ancillary control schemes can enhance the contribution of distribution-level resources to overall power system stability. However, existing literature lacks unified control frameworks that deliver fast frequency response (FFR) while accounting for system-specific components. This paper proposes an FFR strategy for FCSs based on a grid-forming control architecture. The proposed method leverages the energy stored in the internal DC bus capacitors to enable rapid response during transient events and supports communication-free reserve dispatch during critical conditions. The effectiveness of the approach is validated through simulations and controller hardware-in-the-loop (C-HIL) testing.",

      "abstract": "Power systems face increasing uncertainties that create nonlinear regime-dependent dynamics. Critical Clearing Time (CCT) remains a key transient stability metric, yet analytical relations with operating conditions are rarely tractable. Advanced machine learning techniques offer accurate CCT prediction and partial interpretability, but fail to uncover the governing functional dependencies. This paper introduces a Piecewise Symbolic Regression (Pc-SR) framework that automatically discovers regime-conditioned equations linking system variables to CCT. Pc-SR combines cost–complexity–pruned decision trees for task-aware partitioning with symbolic models in each region. Validation on synthetic data confirms recovery of correct partitions and equations under noise, while tests on single-machine infinite-bus variants rediscover analytical CCT equations. Applied to a modified 39-bus system with inverterbased resources, Pc-SR produces interpretable, regime-specific CCT surrogates matching black-box accuracy while exposing nonlinearities and interactions. This framework advances beyond descriptive explainability, providing transparent models to accelerate stability screening and support operator insight into complex dynamic behaviors.",

      "abstract": "A primary responsibility of Transmission System Operators (TSOs) is frequency control, achieved by maintaining generation-load balance within the power system. Swissgrid, the Swiss TSO, traditionally managed balancing energy activation manually. However, this approach faced diminishing economic efficiency, driven by escalating imbalance situations and increasing balancing energy costs. The multi-stage activation process spanning European and national balancing markets creates complex sequential decision-making problems. In response, Swissgrid developed and operationalized a machine learning-based automation solution, becoming one of the first TSOs worldwide to implement such automation and the first with a cost-optimized approach. This paper presents a stacking ensemble forecasting method that dynamically leverages multiple model strengths based on operating conditions. Additionally, we describe our approach to optimize activation decisions across European and national balancing markets. Our automation achieved a 27% decrease in imbalance forecast error compared to system operators and C30-50 million average annual cost reduction.",

      "abstract": "This paper addresses the classic problem of parameter estimation (PE) in multimachine power system models. Such models are typically described by a set of nonlinear differential algebraic equations (DAE), where generator physics and network power flow equations are coupled. DAE models are well established in classic power system textbooks, but parameter identification and estimation of generator inertia and damping together with network branch resistances and reactances for these models remain relatively underexplored. In contrast to prior approaches that rely on ODE approximations, this paper develops a joint Bayesian inference framework to perform PE of generator and network parameters while exploiting grid DAE models. It further combines physics-aware statistical modeling with computationally efficient posterior sampling to make joint Bayesian calibration practical. Results on the IEEE 9-bus system show accurate parameter recovery with well-behaved posterior uncertainty, while a short 39-bus study provides evidence that the framework remains effective on a materially larger joint-estimation problem. These results are obtained without requiring overly conservative priors.",

      "abstract": "This paper presents a real-time Adaptive Protection Scheme (APS) for Medium-Voltage (MV) distribution networks with high penetration of inverter-based Distributed Energy Resources (DER). The framework combines offline and online operational phases for improving overcurrent protection coordination and decision stability under realistic operating conditions. This paper proposes a robust real-time selection algorithm for the protection groups, embedding explicit anomaly detection and anti-flapping mechanisms on top of a previously validated adaptive engine. The online algorithm includes a variational autoencoder (VAE)-based current measurement filter and outlier detector, and a support vector machine (SVM) for mapping filtered real-time current measurements to the predefined protection settings groups. A multi-criteria anti-flapping logic is then applied to enforce membership-based confidence, temporal dwell times, and M-of-N persistence before issuing setting group changes. The adaptive protection scheme is IEC 61850-compliant and can be demonstrated in real-time simulation and hardware-in-the-loop (HIL) setups. Extensive short circuit studies on the IEEE 33 bus test feeder across multiple distributed energy resources (DER) penetration levels and two fault resistance regimes (solid, 0 Ω; and 30 Ω) show a 99.9% successful fault clearing rate, with improved selectivity, sensitivity, and overall robustness of the protection scheme while significantly reducing spurious setting oscillations under DER ramps, noisy measurements, and sensor dropouts.",

      "abstract": "Battery energy storage systems (BESS) are key units to deal with fluctuating renewable generation by offering frequency responses (FRs). To facilitate the deployment of grid-scale BESS for FR, this paper proposes energy management and planning methods for BESS in the context of end-state FR service markets in the UK. Driven by the specific market mechanisms, the energy management method dynamically adjusts half-hour operational baseline profiles to mitigate deviations of state of energy forecasts from target energy footroom/headroom levels. Then, the lifecycle BESS operation and economics are simulated, based on which the equivalent annual annuity of the BESS project is maximised by optimising BESS capacities and target energy levels as well as FR bidding capacities. The proposed methods are applied to a stand-alone BESS providing either or both Dynamic Containment and Dynamic Moderation services, and discussed around FR delivery performance and sensitivity of planning results to clearing prices.",

      "abstract": "This paper presents the formulation of time-window averaged (TWA) and time-window ramping (TWR) hydraulic constraints within the short-term hydrothermal scheduling problem. Conventional instantaneous hydraulic constraints enforce strict limits at every time step, which can result in an overly restrictive behavior in highly discretized horizons. The proposed formulations introduce time-window constraints, providing more flexible alternatives to instantaneous limits and enabling a more realistic representation of operational flexibility. The TWA formulation imposes bounds on average values of hydraulic variables within daily or weekly windows, while the TWR formulation restricts variations between consecutive windows or periodic time points. Both constraints can be applied to variables such as discharge, spillage, and storage. The paper also addresses upstream water level constraints, whose nonlinear relations are approximated as constraints on stored volume, in order to preserve model linearity. The proposed formulations were validated on real test cases from the Brazilian Independent System Operator, confirming their practical applicability in large-scale hydrothermal systems.",

      ],
      "abstract": "The absence of formal performance guarantees in machine learning (ML) has limited its adoption for safety-critical power system applications, where confidence and interpretability are as vital as accuracy. In this work, we present a probabilistic guarantee for power flow learning and voltage risk estimation, derived through the framework of Gaussian Process (GP) regression. Specifically, we establish a bound on the expected estimation error that connects the GP’s predictive variance to confidence in voltage risk estimates, ensuring statistical equivalence with Monte Carlo–based ACPF risk quantification. To enhance model learnability in the low-data regime, we first design the Vertex- Degree Kernel (VDK), a topology-aware additive kernel that decomposes voltage–load interactions into local neighborhoods for efficient large-scale learning. Building on this, we introduce a network-swipe active learning (AL) algorithm that adaptively samples informative operating points and provides a principled stopping criterion without requiring out-of-sample validation. Together, these developments mitigate the principal bottleneck of ML-based power flow—its lack of guaranteed reliability—by combining data efficiency with analytical assurance. Empirical evaluations across IEEE 118-, 500-, and 1354-bus systems confirm that the proposed VDK-GP achieves mean absolute voltage errors below 1E-03 p.u., reproduces Monte Carlo–level voltage risk estimates with 15× fewer ACPF computations, and achieves over 120× reduction in evaluation time while conservatively bounding violation probabilities.",

      "abstract": "Managing the electric demand of heat pumps on the coldest days is an important aspect of congested low voltage grids. Specifically, severe frosting of the evaporator deteriorates system performance. Contemporary models are limited in representing severe frosting conditions. To understand the potential impacts of these conditions on the grid, a new model for the initiation and operation of defrost cycles that incorporates relative humidity, outdoor temperature, and heat pump loading was developed. To investigate regular and flexible operation of the system, various heating system design parameters were simulated. The simulations show that the heat pump was able to coordinate all tasks without additional electric resistive heating. Furthermore, the impact of a flexibility request on the amount of defrost cycles was found to be negligible. Finally, the results highlight the need to consider both efficiency and flexibility during the design process.",

      "abstract": "Solving for globally optimal line switching decisions in AC transmission grids can be intractably slow. Machine learning (ML) models, meanwhile, can be trained to predict near-optimal decisions at a fraction of the speed. Verifying the performance and impact of these ML models on network operation, however, is a critically important step prior to their actual deployment. In this paper, we train a Neural Network (NN) to solve the optimal power shutoff line switching problem. To assess the worst-case load shedding induced by this model, we propose a bilevel attacker-defender verification approach that finds the NN line switching decisions that cause the highest quantity of network load shedding. Solving this problem to global optimality is challenging (due to AC power flow and NN nonconvexities), so our approach exploits a convex relaxation of the AC physics, combined with a local NN search, to find a guaranteed lower bound on worst–case load shedding. These under-approximation bounds are solved via MathOptAI.jl. We benchmark against a random sampling approach, and we find that our optimization-based approach always finds larger load shedding, by an average margin of 33% in the largest test case. Test results are collected on multiple PGLib test cases and on trained NN models which contain more than 10 million model parameters.",

      "abstract": "In energy system analysis, coupling models with mismatched spatial resolutions is a significant challenge. A common solution is assigning weights to high-resolution geographic units for aggregation, but traditional models are limited by using only a single geospatial attribute. This paper presents an innovative method employing a self-supervised Heterogeneous Graph Neural Network to address this issue. This method models highresolution geographic units as graph nodes, integrating various geographical features to generate physically meaningful weights for each grid point. These weights enhance the conventional Voronoi-based allocation method, allowing it to go beyond simply geographic proximity by incorporating essential geographic information. In addition, the self-supervised learning paradigm overcomes the lack of accurate ground-truth data. Experimental results demonstrate that applying weights generated by this method to cluster-based Voronoi Diagrams significantly enhances scalability, accuracy, and physical plausibility, while increasing precision compared to traditional methods. Code is available at https://github.com/KIT-IAI/AllocateGNN",

      "abstract": "Accurate probabilistic forecasting of intraday electricity prices is critical for market participants to inform trading decisions. Existing studies rely on specific domain features, such as Volume-Weighted Average Price (VWAP) and the last price. However, the rich information in the orderbook remains underexplored. Furthermore, these approaches are often developed within a single country and product type, making it unclear whether the approaches are generalizable. In this paper, we extract 384 features from the orderbook and identify a set of powerful features via feature selection. Based on selected features, we present a comprehensive benchmark using classical statistical models, tree-based ensembles, and deep learning models across two countries (Germany and Austria) and two product types (60-min and 15-min). We further perform a systematic generalization study across countries and product types, from which we reveal an asymmetric generalization phenomenon: models trained on more liquid markets or products transfer well to less liquid ones, whereas the reverse transfer leads to substantial performance degradation. The project page is at https://runyao-yu.github.io/AsymGen/.",

      "abstract": "High renewable penetration increases the frequency and magnitude of net-load ramps, stressing real-time flexibility. Two commonly deployed remedies are look-ahead economic dispatch (LAED) and ramp products (RPs), yet their operational equivalence under the industry-standard rolling-window dispatch implementation is not well understood. This paper develops linear optimization models for multi-interval LAED and RP-based co-optimization, and proves that an enhanced RP formulation can match LAED’s dispatch feasible region at a single time step when additional intertemporal deliverability constraints are enforced. We then show that this equivalence does not generally persist under rolling-window operation because LAED and RP formulations optimize different intertemporal objectives, leading to divergent end-of-window states. Using different test systems under stressed ramping conditions and multiple load levels, we show LAED achieves similar or lower load shedding than RP implementations with the same look-ahead horizon, with the most pronounced differences under high-load, ramp-limited conditions. The study highlights the limitations of current ramp product implementations and suggests enhancements, such as introducing more mid-duration RPs.",

      "abstract": "Typhoon-induced failures pose significant threats to active distribution networks (ADNs), necessitating rapid dynamic network reconfiguration (NR) for operational resilience. Traditional mixed-integer programming (MIP) approaches for the NR suffers from prohibitive computational burdens that impede realtime emergency response. This paper proposes a novel graph neural network (GNN)-enabled optimization framework (GraNR) for fast and near-optimal dynamic reconfiguration under typhoons. The framework incorporates a switch-as-gate message passing mechanism to model physical switching operations, topologyagnostic local predictors to ensure scalability across network configurations, pre-ML filtering to identify non-critical switches, and post-ML confidence-based selection to strategically fix highconfidence decisions while retaining uncertain variables for subsequent MIP optimization. By integrating neural predictions with mathematical programming, GraNR leverages the speed of machine learning and the optimality guarantees of optimization solvers. Numerical experiments on the IEEE 33-bus system demonstrate that GraNR achieves 1.64× computational speedup with only 0.67% average optimality gap, validating the practical viability for enhancing distribution system resilience against extreme weather events.",

      "abstract": "A precise estimation of the Rate of Change of Frequency (RoCoF) is crucial for secure power system operation. In fact, RoCoF is strictly related to the amount of the available physical and/or virtual inertia of the system and the severity of the active power unbalance following a disturbance. For this reason, it is widely exploited in different protection systems, e.g., Anti-Islanding, Under Frequency Load Shedding (UFLS) and wide-area protection systems. The new paradigm of modern power systems, with a low-inertia and converter-based generation assets, is increasing the transient severity, making the frequency and the RoCoF estimation more complex and less precise for the actual devices. This work addresses this issue by proposing a numerically robust approach based on concepts inherited from differential geometry and fluid mechanics. The proposed approach is then tested with high-sampling real experimental measurements and used to develop a faster control logic for a RoCoF-based UFLS control scheme. The proposed approach provides information to protections regarding the nature of the contingency which can be used to improve its response.",

      "abstract": "Sugarcane biomass is a strategic resource for the energy transition, particularly in Brazil, where it underpins electricity and ethanol production. Investment planning is challenged by diverse production pathways, price volatility, and feedstock variability. This work develops a two-stage stochastic optimization model integrating investment and operational decisions for sugarcane facilities. The model aims to support robust planning for diversified biomass plants, aiding the sector’s decarbonization. The first stage defines capacity expansion under economies of scale through a power-law cost function. The second stage defines operational decisions under price and feedstock uncertainty, modeled via scenarios and Conditional Value-at-Risk. From an investor’s perspective, the objective is to minimize risk-adjusted net costs. In addition to its methodological contributions, this work also provides an open-source implementation of the proposed capacity expansion planning framework, referred to as OptBio. A Brazilian case study shows risk-neutral strategies favor sugar/ethanol but are vulnerable, whereas risk-averse strategies promote diversification. Sensitivity analyses indicate biomethane and hydrogen may become viable with favorable prices, while biochar boost productivity and profitability.",

      "abstract": "Grid-connected power converters encounter significant stability challenges during weak grid faults, when conventional PI-based controllers exhibit an oscillatory response and poor fault-ride-through performance. This paper addresses this problem by replacing the conventional outer PI controllers that regulate DC-link and PCC voltages with an offset-free datadriven predictive controller. The developed algorithm leverages either pre-fault or fault-time data to construct input-output predictors, yielding offset-free control without the need for physicsbased modelling. Simulation results show that pre-fault offset-free DPC doubles the critical equivalent grid impedance that can be handled and reduces the root mean squared error during faults by a factor of 40, while maintaining computation times comparable to conventional PI control. These findings demonstrate that the developed offset-free data predictive controller offers a simple, robust, and computationally efficient alternative to conventional control, significantly enhancing fault-ride-through capabilities of converters in weak grids.",

      "abstract": "The Unit Commitment (UC) problem seeks optimal generation schedules under technical and economic constraints. Increasing renewable energy penetration amplifies uncertainty in net load forecasting. Classical approaches, such as stochastic and robust UC models, partially address this challenge but face wellknown drawbacks: stochastic formulations may overfit sampled scenarios, while robust methods tend to yield overly conservative solutions. To overcome these limitations, Distributionally Robust Optimization (DRO) has emerged as a promising alternative by explicitly accounting for ambiguity in probability distributions. While prior DRO studies in UC rely on moment constraints, ϕ- divergences or the Wasserstein distance with the L1 norm, the potential of other Wasserstein distances, especially with the L2- norm, remains unexplored. This paper presents a unified Benders decomposition framework for two-stage UC models with righthand side uncertainty that efficiently solves various approaches, including DRO using Wasserstein distance. Numerical experiments on IEEE test systems evaluate out-of-sample performance and computational times across different uncertainty levels.",

      "abstract": "Increasing penetration of renewable generation in power systems leads to more frequent occurrences of start-up costs, a factor not adequately characterized in conventional electricity markets. Addressing this issue, convex hull pricing has gained prominence by offering additional uplift payments to better incentivize generators to follow independent system operators' dispatch instructions. However, the interpretation and calculation of convex hull prices (CHPs) is often challenging. This stems from both non-convex generation costs and coupled optimization structures inherently involved in the convex hull pricing problem. To this end, in our paper, the CHP is deciphered as a marginal price at which the combined generation covers the targeted demand in the sense of convex hull. Drawing inspiration from this deciphering, we focus on solving the CHPs calculation issue via demand space partition, which directly builds a mapping from demands to CHPs. Following this vein, we first introduce a heuristic iterative algorithm for the individual maximum profit problem to partition the price space based on optimal generations. Then, we propose an efficient approximate method for calculating the Minkowski sum of polytopes defined by these optimal generations, thereby achieving a division of the demand space. Our results offer valuable insights into both CHP deciphering and calculation.",

      "abstract": "In this work, the authors present the results of a study conducted at the University of Bras´ılia (UnB), Brazil, which had as its main objective to evaluate and compare daily forecast models for electricity generation in photovoltaic (PV) plants. The proposed solution is based on an infrastructure for mea- suring electrical quantities and developing supervisory software, enabling continuous operational monitoring of the University’s buildings. The model evaluation employs six standardized metrics for solar energy forecasting, following NREL guidelines and best international practices. These metrics enable objective selection of the most suitable algorithms for operational photovoltaic plants applications, providing a comprehensive assessment of both accuracy and reliability. The top three exogenous models provided nMAE (Normalized Mean Absolute Error) around 4.91-5.10%, which significantly outperform the three best tem- poral models, which provided nMAE around 14.16-14.27%, with an improvement of about 65% in forecast error. Even more critical, the coefficient of determination (R2) rose from 0.12 to 0.90, demonstrating that physical variables encode the essential mechanisms of PV energy generation that temporal variables cannot adequately represent. These models represent the three most effective features of engineering strategies. Only models that presented nMAE below 5.2% and R2 above 0.89 were chosen, ensuring high forecasting accuracy for reliable operational anomaly detection. An anomaly detector based on the Energy Performance Index (EPI), framework defined in IEC 61724, was developed using a machine learning model and used as the expected performance reference, which normalizes the operational analysis by removing the effect of weather conditions. The exceptional accuracy of the selected models (nMAE 5%, R² > 0.89) shows that the proposed solution has great potential for application in Energy Management Systems (EMS), as it enables the timely implementation of preventive and corrective maintenance measures, avoiding financial losses.",

      "abstract": "“Fairness-aware” algorithms are increasingly used to allocate grid capacity in electrical power systems, yet they often overlook existing disparities between household groups, such as those arising from unequal rooftop solar adoption. Through simulations on a stylized low-voltage grid using electricity data from the Netherlands, we apply demographic parity, a group fairness metric, to compare differences in grid access and costs between households with and without rooftop solar. Three objectives are analyzed: minimal intervention, proportional fairness, and min-max fairness. The results indicate that (1) “fairnessaware” allocation does not eliminate group disparities, (2) voltage violations influence the distribution of burdens and benefits, (3) lower curtailment compensation can reduce disparities between households, and (4) common fairness evaluation metrics do not capture these group disparities. This study advances the discussion on fairness in power systems computation by encouraging further research on how to avoid reinforcing existing disparities.",

      "abstract": "This paper presents a hybrid modeling approach to approximate hydro unit commitment (HUC) constraints, especially the discontinuous operating ranges, in the Brazilian large-scale day-ahead dispatch model (DADM). The current DADM uses a plant-based hydro production function (HPF), which is computationally manageable but cannot accurately capture unit-level constraints, such as forbidden operating zones and different unit types. Although more precise, full unit-based models are too computationally intensive for the Brazilian context, which includes 156 hydro plants and around 745 hydro units. The proposed hybrid method combines plant-level and grouped unit-level HPFs, enabling an accurate representation of operating zones and different units while managing combinatorial complexity. The hybrid approach is tested and compared with the actual HPF model using real data from the Brazilian system under various hydrological and load conditions. The results show that the hybrid model ensures unit-level feasibility, reduces the need for post-processing adjustments, and improves the predictability of the day-ahead dispatch process.",

      "abstract": "This paper proposes a two-layer mixed-integer linear programming (MILP) strategy to efficiently solve the day-ahead generation scheduling (DAGS) problem in large multi-unit, head-dependent hydro plants subject to environmental and grid connection constraints. The DAGS problem in such cases is computationally challenging due to the nonlinear coupling between head, turbined outflow, and generator efficiency, multiple identical generating units (GUs), and time-coupled environmental constraints. The proposed two-layer approach addresses these challenges by decoupling the problem into two sequential MILPs. In the first layer, the hydro production function (HPF) is approximated by a piecewise-concave model to determine reservoir level trajectories while mitigating symmetry issues among identical GUs. In the second layer, given the reservoir levels from the first stage, a sequence of one-step MILPs refines the dispatch using a more accurate HPF representation. The approach is tested on the Brazilian Jirau hydropower plant (50 units, 3750 MW), revealing that the proposed strategy yields generation schedules equivalent to those of a full nonconvex MILP formulation while drastically reducing computation time. These results demonstrate the potential of hierarchical MILP decomposition to improve the scalability and realism of large-scale hydro day-ahead scheduling models.",

      "abstract": "The integration of converter-interfaced generation introduces new transient stability challenges to modern power systems. Classical Lyapunov- and scalable passivity-based approaches typically rely on restrictive assumptions, and finding storage functions for large grids is generally considered intractable. Furthermore, most methods require an accurate grid dynamics model. To address these challenges, we propose a model-free, nonlinear, and dissipativity-based controller which, when applied to grid-connected virtual synchronous generators (VSGs), enhances power system transient stability. Using input– state data, we train neural networks to learn dissipativitycharacterizing matrices that yield stabilizing controllers. Furthermore, we incorporate cost function shaping to improve the performance with respect to the user-specified objectives. Numerical results on a modified, all-VSG Kundur two-area power system validate the effectiveness of the proposed approach.",

    {
      "id": "2172",
      "title": "A critical look at the equal-area criterion for analyzing transient stability: Is what we have all learned correct?",
      "authors": [
        "Lutz Hofmann"
      ],
      "abstract": "The equal-area criterion is a graphical method for analyzing transient stability that has been known since the 1920s. It is intuitive, easy to understand, and used primarily in academic education. However, the integral of power P over transient angle   used to calculate the acceleration area Facc and deceleration area Fdec in the P- -diagram has no physical significance, since it describes power but not energy. This leads to the further question of what these areas actually represent. In this paper the energy changes during rotor acceleration and deceleration and their relationships to the areas Facc and Fdec are analyzed and obvious contradictions between assumptions and used swing equation, such as the usual assumption of constant turbine power, are explained. Key findings are that the areas Facc and Fdec only represent a small portion of the energy exchanged during the acceleration or deceleration phase, and that a M- -representation (M≙torque) should be used instead of the usual P- -diagrams in order to remain physically correct.",

      "abstract": "This paper investigates transient voltage stresses on a Dedicated Metallic Return (DMR) cable in an offshore ±525 kV bipolar VSC-HVDC system. The submarine DC cable bundle, including both pole and DMR cables, is modeled in detail, providing a full representation of its internal structure. Electromagnetic transient (EMT) simulations are conducted to analyze the impact of neutral bus grounding resistance and proximity effects on DMR cable voltage under DC faults. The performance of the neutral bus surge arrester is also evaluated, along with the influence of key parameters such as MMC arm inductance, transformer reactance, and AC breaker tripping time on arrester energy absorption. The results offer new insights into the transient behavior of DMR cables in bipolar VSC-HVDC links and provide a reference for system design and protection studies.",

      "abstract": "Reinforcement learning (RL) has shown great potential for designing voltage control policies, but their performance often degrades under changing system conditions such as topology reconfigurations and load variations. We introduce a topology-aware online policy optimization framework that leverages data-driven estimation of voltage–reactive power sensitivities to achieve efficient policy adaptation for medium-voltage radial distribution networks. Exploiting the sparsity of topologyswitching events, where only a few lines change at a time, our method efficiently detects topology changes and identifies the affected lines and parameters, enabling fast and accurate sensitivity updates without recomputing the full sensitivity matrix. The estimated sensitivity is subsequently used for online policy optimization of a pre-trained neural-network-based RL controller. Simulations on both the IEEE 13-bus and SCE 56- bus systems demonstrate over 90% line identification accuracy, using only 15 data points. The proposed method also significantly improves voltage regulation performance compared with nonadaptive policies and adaptive policies that rely on regressionbased online optimization methods for sensitivity estimation.",

    {
      "id": "2332",
      "title": "A Privacy-Preserving Distributed Congestion Management Framework via Implicit Differentiation Bilevel Optimization",
      "authors": [
        "Xin Li",
        "Sen Zhan",
        "Haoyang Zhang",
        "Koen Kok",
        "Nikolaos G. Paterakis"
      ],
      "abstract": "The growing integration of flexible distributed energy resources (DERs), such as hybrid heat pumps (HHPs), provides distribution system operators (DSOs) with valuable tools to manage grid congestion. Traditional approaches typically model the interaction between DSOs and prosumers with flexibility resources as a bilevel optimization problem. In this framework, the overall problem is typically reformulated through the Karush–Kuhn–Tucker (KKT) conditions into a single-level optimization problem, under the assumption that the DSO has complete knowledge of the prosumers’ lower-level optimization models. This assumption, however, violates realistic privacy and communication constraints, making KKT-based approaches impractical in real-world applications. To address this issue, this paper introduces a privacy-preserving framework, namely implicit differentiation bilevel optimization (IDBO), which leverages implicit differentiation to construct a differentiable convex optimization model. In this setting, each prosumer in the lower-level only transmits non-sensitive intermediate gradients to the DSO in the upper level, thus maintaining data confidentiality while still enabling end-to-end gradient-based optimization. A case study based on real measurements from a pilot project demonstrates the effectiveness of the proposed method. The approach shows high accuracy and notable improvement in computational efficiency compared to the traditional KKT-based approach, particularly in large-scale settings with more than one hundred prosumers in a distributed structure.",
      "keywords": [
        "congestion management",
        "distributed energy resources",

      "abstract": "This paper presents a novel structure-preserving, Kron-based reduction framework for unbalanced distribution feeders. The method aggregates electrically similar nodes within a mixed-integer optimization (MIP) problem to engender reduced networks that optimally reproduce the voltage profiles of the original full network. To overcome computational bottlenecks of MIP formulations, we motivate an exhaustive-search formulation to identify optimal aggregation decisions, while enforcing voltage margin limits. The proposed exhaustive network reduction algorithm is parallelizable on GPUs, which enables scalable network reduction. The resulting reduced networks approximate the full system’s voltage profiles with low errors, and are suitable for steady-state analysis and optimal power flow studies. The framework is validated on two real utility distribution feeders with 5,991 and 8,381 nodes. The reduced models achieve up to 90% and 80% network reduction, respectively, while the maximum voltage-magnitude error remains below 0.003 p.u. Furthermore, on a 1000-node version of the network, the GPUaccelerated reduction algorithm runs up to 15x faster than its CPU-based counterpart.",

      "abstract": "The increasing interconnection of power systems through AC and DC links enables energy storage units to access multiple electricity markets, yet most existing arbitrage models remain limited to single-market participation. This gap restricts understanding of the economic value and operational constraints associated with cross-border storage operation. To address this, an optimal multi-region energy storage arbitrage model is developed for a grid-scale battery located at one end of an interconnector linking two distinct day-ahead markets. The formulation incorporates battery capacity and ramping limits, converter and interconnector losses, and market-specific buying and selling prices. Using disjunctive linearization of nonlinear terms, this work exactly reformulates the multi-region energy arbitrage optimization as a mixed-integer linear programming problem. The proposed formulation ensures that the battery either charges or discharges from all participating energy markets simultaneously at any given time. Case studies using eight years of Belgian–UK price data demonstrate that multi-region participation can increase arbitrage revenue by more than 40% compared to local energy arbitrage operation only, while also highlighting the negative impact of interconnector congestion on achievable gains. The results indicate that cross-border market access substantially enhances storage profitability while considering the cycle of battery and that the proposed formulation provides a computationally efficient framework for evaluating and operating storage assets in interconnected power systems. Finally, a pseudo-efficiency term is introduced to improve battery utilization by discarding less profitable charging and discharging battery cycles.",

      "abstract": "This paper presents a passive islanding detection method for grid-connected inverter-based system (IBS), leveraging synchro-waveform measurements. The proposed approach continuously monitors three-phase voltage and current signals at the point of common coupling (PCC) using a waveform measurement unit (WMU). A theoretical threshold is derived to represent the maximum permissible variation between consecutive samples of a sinusoidal waveform under normal grid-connected conditions. An islanding event is detected when the measured voltage variation exceeds this threshold. The method is validated through simulations of a photovoltaic (PV) plant connected to the IEEE 9-bus test system using the Hypersim real-time simulator. Results demonstrate reliable islanding detection in approximately 0.1 ms while remaining robust under large load variations and nonislanding disturbances. Unlike traditional RMS-based techniques, the proposed method exploits instantaneous waveform dynamics, enabling detection under challenging power balance conditions associated with the non-detection zone (NDZ). Since the technique does not rely on external perturbations or communication channels, it introduces no power quality degradation and is suitable for near real-time implementation in modern distributed inverterbased power systems.",

      "abstract": "European decarbonization policies are accelerating the shift from fossil-based generation to Variable Renewable Energy Sources (VRES). While essential for climate goals, this transition challenges system reliability due to renewable variability. Demand Response (DR), and particularly Direct Load Control (DLC), offers a promising solution to enhance flexibility by shifting electricity demand. This study assesses industrial DLC at the European level within long-term investment planning. A database of industrial load profiles and demand projections is developed for 28 countries over 2025–2060 and integrated into the open-source EMPIRE model, a multi-period stochastic capacity expansion model for the European power sector, extended with a DLC module for load shifting. Results show savings between 0.44% and 1.47% compared to the No DLC case, with activated DLC accounting for 2–5% of the Maximum Reduction potential. The flexibility rate amplifies the benefits of longer shift windows, reducing Li-ion BESS utilization by up to 10.31% and increasing solar generation and installed capacity.",

        "Behzad Kordi"
      ],
      "abstract": "I. MOTIVATION In an electric power system, transformers are crucial, expensive components, and their failure can cause serious problems. In the insulation system of transformers, the winding insulation is the most vulnerable component to faults [1]. To ensure reliable transformer operation, fault identification is essential. To gain a better understanding of fault propagation within the windings, high-frequency modeling of the transformer windings is inevitable. The model can also be used to simulate and analyze different scenarios and conditions of transformer windings whether in healthy or faulty conditions. II. NOVEL CONTRIBUTIONS This work presents a transformer winding simulation model and verifies it experimentally. To accurately simulate the propagation of faults along the winding, an axial-multiconductor transmission line (AMTL) model of the winding is employed [2]. The AMTL model takes the variation in the radius of winding turns into account, providing a more accurate representation at high frequencies. The model is applied to a high-voltage continuous disk intershielded transformer winding with 42 disks [3]. The modelled case comprehensively analyzes the proposed model’s performance for such complicated winding configurations. The verifications are conducted using various techniques and measurements up to a few MHz frequency, demonstrating the accuracy and reliability of the AMTL model in transformer windings. The developed model can be used to simulate transient or nontransient electrical faults in transformer windings to develop a condition monitoring system. III. THE PROPOSED APPROACH The AMTL theory is presented and applied to the 42-disk test transformer winding introduced above. Calculating the per-unit length (PUL) parameters of the windings is also discussed. Finite element method (FEM) is employed to calculate PUL capacitance and inductance matrices of the transformer winding. They are calculated based on the numerical solution of Maxwell’s equations in electrostatic and magnetostatic regimes, respectively. Frequency-dependent resistance and conductance are calculated based on the cross-sectional shape of the conductors to model losses in the winding. There are several shield turns in the first few disks of the winding. In order to model the shield turns, they are considered as conductors of the AMTL model with their own dimensions and configurations. IV. NUMERICAL EXPERIMENTS AND VALIDATION Model verification is achieved by comparing a measured input admittance using an Omicron Bode Analyzer with the simulated input admittance calculated using the winding models, considering different resistance calculations. To evaluate the accuracy of the proposed model for fault detection, experiments are conducted. The experiments evaluates the model performance for the two common types of electrical faults in transformer windings, which are partial discharge and short circuit. REFERENCES [1] M. R. Hussain, S. S. Refaat, and H. Abu-Rub, “Overview and partial discharge analysis of power transformers: A literature review,” IEEE Access, vol. 9, pp. 64 587–64 605, 2021. [2] M. Gunawardana, F. Fattal, and B. Kordi, “Very fast transient analysis of transformer winding using axial multiconductor transmission line theory and finite element method,” IEEE Transactions on Power Delivery, vol. 34, no. 5, pp. 1948–1956, 2019. [3] H. Moradi Tavasani, W. Ziomek, and B. Kordi, “Machine-learning supported localization of partial discharges in real-size transformer winding using noninvasive capacitively-coupled pulse injection,” IEEE Trans. Dielectrics and Electrical Insulation, vol. 31, no. 6, pp. 2984–2992, 2024.",

      "abstract": "To safely allow connections beyond conventional capacity limits, system operators require reliability models that capture the full lifecycle of their assets. Although conditionmonitoring– based approaches are well established for highvoltage components, they require intensive data collection which is unavailable in the medium-voltage grid. Previous research on statistical models assume monotonic failure rates and therefore generally ignore infant mortality failures, leading to overestimated lifetimes. This paper introduces a parametric survival regression framework using the additive Weibull distribution, which expresses the failure rate as superposition of Weibull components for the infant mortality, useful life, and aging phases. The model parameters are estimated through maximum likelihood while accounting for censoring and truncation, and regression of the component’s characteristics (voltage and rating) enables interpretable, asset-specific lifetime estimation. Validation with synthetic data confirms accurate recovery of known parameters, whereas application to a real dataset of distribution transformers shows that early-life failures depend mainly on rating, while aging-related failures depend on both rating and voltage.",

      "abstract": "The uncertainty introduced by inverter-based resources (IBRs) increasingly challenges secure and economic power system operation, as conventional deterministic optimal power flow (OPF) cannot rigorously capture the full range of optimal operating states. To address this, this paper devises a reachable OPF (ReachOPF) framework that reformulates OPF under uncertainty as a reachability problem of an augmented continuous-time ordinary differential equation (ODE) system. By embedding the OPF constraints into a preconditioned augmented-Lagrangian flow with residual filtering and parameter-as-state modeling, ReachOPF enables one-shot propagation of uncertainty through zonotopic reachable-set computation instead of repeated sampling. Case studies on 3-bus and 30bus systems show that ReachOPF achieves guaranteed coverage of all Monte Carlo solutions with significantly reduced computational cost, demonstrating its rigor, scalability, and suitability for uncertainty-aware OPF analysis.",

      "abstract": "Optimal transmission switching (OTS) determines which transmission lines to remove from service to minimize dispatch costs. Unlike topology design, it alters the operational status of operating lines. Sensitivity-based methods, as advanced optimization techniques, select lines whose outage yields a significant cost reduction. However, these methods overlook bus splitting, an effective congestion management strategy that our work incorporates to achieve improved economic gains. In this work, we formulate an optimal transmission reconfiguration (OTR) problem that incorporates both line switching and bus splitting. We develop a novel approach to quantify the sensitivity of the OTR objective to line switching and bus splitting, establish connections between the proposed sensitivity framework and existing heuristic metrics, prove the equivalence between bus splitting and a generalized line switching to enable unified treatment, and provide a simpler derivation of Bus Split Distribution Factor (BSDF). Simulations on nine IEEE test systems spanning 118 to 13,659 buses demonstrate the high effectiveness of our proposed sensitivity method. They also demonstrate that incorporating bus splitting into transmission reconfiguration achieves greater cost savings than line switching alone. The results confirm the economic advantage of this comprehensive approach to transmission system operation.",

      ],
      "abstract": "Dynamic parameter estimation of power plants became increasingly challenging and important in rapidly evolving power grid. Despite significant advancements, legacy generators continue to struggle to meet standard compliance requirements, necessitating the use of advanced measurement devices for mandatory model validation. To address these challenges, legacy generators should undergo systematic model validation programs supported by the point on wave measurements through the existing devices. This paper utilizes the short duration relay records to estimate the synchronous machine and excitation system parameters using an enhanced scattered search method. The proposed algorithm has a high probability of finding the global minima to achieve accurate parameter estimation in cases of high-dimensional and non-linear conditions with fewer tunable parameters. The proposed approach is demonstrated using data from a 247 MVA, 15.75 kV generator in a thermal power plant using its practical protective relay records. The proposed method is found to be accurate and reliable for parameter estimation using synthetic and practical measurement data.",

      "abstract": "The lecture first introduces the concept of complex frequency, which extends the conventional instantaneous frequency of a signal. Then the lecture defines the concepts of ``local synchronization'' and ``transient slack capability'' The latter definition is based on a port-Hamiltonian modelling approach and discusses energy and control requirements of inverter-based generation to stand large disturbances. Three model-based necessary conditions are proposed to represent the minimum requirements for a device to synchronize to the grid and behave as an energy slack during a transient. A variety of examples based on conventional synchronous and induction machines as well as grid following (GFL) and grid forming (GFM) controllers are utilised to illustrate, both analytically and through simulations, illustrate the concepts of local synchronization and transient slack capability. The last example presents a ``dual-GFM'' controller, which illustrates how to leverage the proposed framework to design novel control schemes that go beyond conventional GFL and GFM architectures.",

      "abstract": "As power system dynamics are increasingly dominated by comparatively many CIDERs, detailed system\\-level stability studies have become a central part in stability assessment, but remain difficult due to limitations in today’s simulation tools and the complexity of assembling credible models. Building on experience modelling parts of the Danish and Australian power systems, this talk focuses on the practical workflow and decision-making required to conduct large‑scale time-domain studies: obtaining and parameterizing models, combining different model types, handling missing data, and navigating the computational limits of EMT, RMS, and hybrid simulators. Motivated by these real‑world challenges, the session further discusses the use of a range of dynamic model‑reduction approaches, including classical, data‑driven, and ML‑based methods. The talk concludes with open research questions and emerging needs for future grids targeting high or fully non‑synchronous operation.",

      "abstract": "The lecture focuses on the synchronization of converters to the power system, presenting different synchronization methods and discussing their influence on the stability and harmonic distortion in Converter-Interfaced Distributed Energy Resources (CIDERs). The cross-coupling phenomena among the synchronization and other control loops are conceptually explained, and their significant influence on converter stability is demonstrated. Nonlinear modelling techniques to analyse CIDER stability and behaviour under harmonic distorted conditions are presented and applied to different grid scenarios. Particular attention is given to the case where detailed models of CIDERs are unavailable to system operators due to Intellectual Property (IP) protection by power electronics manufacturers. For this scenario, grey-box models of CIDERs utilizing structured uncertainties are derived, and robust stability tools are used to guarantee interoperability among converters from different vendors.",

      "abstract": "The lecture introduces the concept of Harmonic Stability Assessment (HSA) of power systems with a high share of CIDERs. To this end, the lecture introduces the concept of Harmonic State-Space (HSS) model of a generic power system formulated by combining the HSS models of the resources and the grid in closed-loop configuration. The HSS model of the resources is obtained from the Linear Time-Periodic (LTP) models of the CIDER components transformed to frequency domain using Fourier theory and Toeplitz matrices as this approach is capable of representing the coupling between harmonic frequencies in detail. The system matrix of the HSS models on power-system or resource level is employed for eigenvalue analysis in the context of HSA. A sensitivity analysis of the eigenvalue loci w.r.t. changes in model parameters, and a classification of eigenvalues into control-design variant, control-design invariant, and design invariant eigenvalues is given together with some application examples.",

      "abstract": "As largely acknowledged, the progressive penetration of Converter-Interfaced Distributed Energy Resources (CIDERs) is fundamentally transforming the dynamics of modern power systems. While these resources are essential to decarbonization goals, their large-scale deployment challenges long-established paradigms of power system operation and stability as well as their modelling and simulation. For over a century, power system analysis has focused primarily on the fundamental frequency component and simplified electromechanical and/or small-signal models. However, contemporary power systems are characterized by dynamics with time-varying broadband spectral content and interactions across multiple frequency ranges. This phenomenon is further amplified in converter-dominated grids. As a result, traditional notions of power system models, fundamental frequency, control, and stability must be revisited, and new analytical frameworks are required to capture dynamics. This tutorial addresses these challenges by bringing together leading experts in the field to present a comprehensive overview of modelling, simulation, and control techniques for converter-dominated power systems. Topics include the conceptual and practical differences between grid-following and grid-forming controllers, synchronization mechanisms, port-Hamiltonian formulations for representing inverter-based generation and dynamic slack bus behaviour, and harmonic stability assessment based on Linear Time-Periodic and Harmonic State-Space modelling. The program is complemented by system-level perspectives from the Irish transmission system operator, offering insights into real-world experiences with up to 80\\% inverter-based generation. Each lecture is supported by live demonstrations based on dedicated software tools, and the tutorial concludes with a round-table discussion to foster exchange between researchers, industry practitioners, and system operators.",
