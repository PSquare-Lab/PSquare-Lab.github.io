<script>
"use strict";
(function () {
  const DATA = JSON.parse(document.getElementById("data").textContent);
  const POINTS = DATA.points;
  const CLUSTERS = DATA.clusters;
  const META = DATA.meta || {};
  const N = POINTS.length;
  const USE_CANVAS = N > 1200;               // spec: canvas if n>1200, else SVG

  // ---- lookups -------------------------------------------------------------
  const byId = new Map(POINTS.map(p => [String(p.id), p]));
  const clById = new Map(CLUSTERS.map(c => [c.id, c]));
  const colorOf = c => (clById.get(c) || {}).color || "#888";
  document.getElementById("brandsub").textContent =
    `${N} papers · ${CLUSTERS.length} clusters`;

  // ---- geometry: data coords -> fitted screen coords (aspect preserved) ----
  const xExt = d3.extent(POINTS, p => p.x);
  const yExt = d3.extent(POINTS, p => p.y);
  const dataW = (xExt[1] - xExt[0]) || 1, dataH = (yExt[1] - yExt[0]) || 1;
  let W = 0, H = 0, s = 1, ox = 0, oy = 0;
  const PAD = 46;

  function computeLayout() {
    W = window.innerWidth; H = window.innerHeight;
    s = Math.min((W - 2 * PAD) / dataW, (H - 2 * PAD) / dataH);
    ox = (W - s * dataW) / 2 - s * xExt[0];
    oy = (H - s * dataH) / 2 - s * yExt[0];
    for (const p of POINTS) { p.sx = ox + s * p.x; p.sy = oy + s * p.y; }
    for (const c of CLUSTERS) {
      c.shull = (c.hull || []).map(([x, y]) => [ox + s * x, oy + s * y]);
      c.cx = d3.mean(c.shull, d => d[0]);
      c.cy = d3.mean(c.shull, d => d[1]);
    }
  }
  computeLayout();

  // ---- interaction state ---------------------------------------------------
  let t = d3.zoomIdentity;            // current zoom transform
  let hoverId = null;                 // hovered dot id
  let pinnedId = null;                // pinned card id
  const selected = new Set();         // isolated clusters (legend)
  let query = "";                     // search string
  const R_BASE = 4.2, R_HOVER = 6.6;

  // Which points match the current search (title / authors / keywords).
  function matches(p) {
    if (!query) return true;
    const hay = (p.title + " " + (p.authors || []).join(" ") + " " +
                 (p.keywords || []).join(" ")).toLowerCase();
    return hay.includes(query);
  }
  // Per-dot opacity from the combined filters.
  function dotAlpha(p) {
    let a = 1;
    if (query && !matches(p)) a = Math.min(a, 0.12);
    if (selected.size && !selected.has(p.cluster)) a = Math.min(a, 0.12);
    if (hoverId != null) {
      const hp = byId.get(String(hoverId));
      if (hp && p.cluster !== hp.cluster) a = Math.min(a, 0.15);
    }
    return a;
  }
  function clusterActive(cid) {
    if (selected.size && !selected.has(cid)) return false;
    return true;
  }
  function labelAlpha() {                       // labels fade out past scale ~2
    return Math.max(0, Math.min(1, (2.4 - t.k) / 0.8));
  }

  // =========================================================================
  //  RENDERER  (SVG for n<=1200, Canvas otherwise) — shared state above
  // =========================================================================
  const app = document.getElementById("app");
  let draw, place;   // draw() full redraw, place() lightweight (hover/opacity)

  const line = d3.line();

  if (!USE_CANVAS) {
    // ---------------- SVG renderer ----------------
    const svg = d3.select(app).append("svg");
    const scene = svg.append("g");
    const gHull = scene.append("g");
    const gDot = scene.append("g");
    const gLabel = svg.append("g");   // labels live in screen space

    const hullSel = gHull.selectAll("path").data(CLUSTERS).join("path")
      .attr("fill", d => d.color).attr("fill-opacity", 0.07)
      .attr("stroke", d => d.color).attr("stroke-width", 1.5)
      .attr("stroke-linejoin", "round").attr("vector-effect", "non-scaling-stroke")
      .style("pointer-events", "none");

    const dotSel = gDot.selectAll("circle").data(POINTS).join("circle")
      .attr("cx", d => d.sx).attr("cy", d => d.sy).attr("r", R_BASE)
      .attr("fill", d => colorOf(d.cluster))
      .attr("stroke", "#0e1116").attr("stroke-width", 0.6)
      .style("cursor", "pointer")
      .on("pointerenter", (e, d) => { if (e.pointerType !== "touch") setHover(d.id, e); })
      .on("pointermove", (e, d) => { if (e.pointerType !== "touch") moveTip(e); })
      .on("pointerleave", (e) => { if (e.pointerType !== "touch") setHover(null); })
      .on("click", (e, d) => onDotClick(e, d));

    const labelSel = gLabel.selectAll("text").data(CLUSTERS).join("text")
      .text(d => d.name).attr("text-anchor", "middle")
      .attr("fill", "#fff").attr("font-size", 12.5).attr("font-weight", 600)
      .attr("paint-order", "stroke").attr("stroke", "#0e1116").attr("stroke-width", 3)
      .style("pointer-events", "none");

    place = function () {
      const hp = hoverId != null ? byId.get(String(hoverId)) : null;
      dotSel.attr("r", d => (String(d.id) === String(hoverId) ? R_HOVER : R_BASE) / t.k)
        .attr("opacity", dotAlpha);
      hullSel.attr("fill-opacity", d => clusterActive(d.id) ? (hp && hp.cluster === d.id ? 0.16 : 0.07) : 0.02)
        .attr("stroke-width", d => hp && hp.cluster === d.id ? 3.4 : 1.5)
        .attr("stroke-opacity", d => clusterActive(d.id) ? 1 : 0.25);
      const la = labelAlpha();
      labelSel.attr("x", d => t.applyX(d.cx)).attr("y", d => t.applyY(d.cy))
        .attr("opacity", d => clusterActive(d.id) ? la : la * 0.25);
    };
    draw = function () {
      hullSel.attr("d", d => line(d.shull) + (d.shull.length > 2 ? "Z" : ""));
      dotSel.attr("cx", d => d.sx).attr("cy", d => d.sy);
      scene.attr("transform", t);
      place();
    };
    // zoom
    svg.call(makeZoom());
    onResize();

  } else {
    // ---------------- Canvas renderer ----------------
    const canvas = d3.select(app).append("canvas").node();
    const ctx = canvas.getContext("2d");
    const quad = d3.quadtree().x(p => p.sx).y(p => p.sy).addAll(POINTS);
    let dpr = 1;

    function resizeCanvas() {
      dpr = window.devicePixelRatio || 1;
      canvas.width = W * dpr; canvas.height = H * dpr;
      canvas.style.width = W + "px"; canvas.style.height = H + "px";
    }
    place = function () { draw(); };
    draw = function () {
      resizeCanvas();
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, W, H);
      ctx.save();
      ctx.translate(t.x, t.y); ctx.scale(t.k, t.k);
      const hp = hoverId != null ? byId.get(String(hoverId)) : null;
      // hulls
      for (const c of CLUSTERS) {
        if (!c.shull || c.shull.length < 3) continue;
        ctx.beginPath();
        c.shull.forEach(([x, y], i) => i ? ctx.lineTo(x, y) : ctx.moveTo(x, y));
        ctx.closePath();
        const act = clusterActive(c.id);
        ctx.fillStyle = c.color;
        ctx.globalAlpha = act ? (hp && hp.cluster === c.id ? 0.16 : 0.07) : 0.02;
        ctx.fill();
        ctx.globalAlpha = act ? 1 : 0.25;
        ctx.lineWidth = (hp && hp.cluster === c.id ? 3.4 : 1.5) / t.k;
        ctx.strokeStyle = c.color; ctx.stroke();
      }
      // dots
      for (const p of POINTS) {
        ctx.globalAlpha = dotAlpha(p);
        ctx.beginPath();
        const r = (String(p.id) === String(hoverId) ? R_HOVER : R_BASE) / t.k;
        ctx.arc(p.sx, p.sy, r, 0, 6.283185);
        ctx.fillStyle = colorOf(p.cluster); ctx.fill();
      }
      ctx.restore();
      // labels in screen space
      const la = labelAlpha();
      if (la > 0.01) {
        ctx.textAlign = "center"; ctx.font = "600 12.5px system-ui, sans-serif";
        ctx.lineJoin = "round";
        for (const c of CLUSTERS) {
          ctx.globalAlpha = clusterActive(c.id) ? la : la * 0.25;
          ctx.lineWidth = 3; ctx.strokeStyle = "#0e1116";
          ctx.strokeText(c.name, t.applyX(c.cx), t.applyY(c.cy));
          ctx.fillStyle = "#fff"; ctx.fillText(c.name, t.applyX(c.cx), t.applyY(c.cy));
        }
      }
      ctx.globalAlpha = 1;
    };

    d3.select(canvas)
      .on("pointermove", (e) => {
        if (e.pointerType === "touch") return;
        const hit = pick(e); moveTip(e);
        setHover(hit ? hit.id : null, e, true);
      })
      .on("pointerleave", () => setHover(null))
      .on("click", (e) => { const hit = pick(e); if (hit) onDotClick(e, hit); });

    function pick(e) {
      const [mx, my] = d3.pointer(e, canvas);
      const dx = t.invertX(mx), dy = t.invertY(my);
      const p = quad.find(dx, dy, 14 / t.k);
      return p || null;
    }
    d3.select(canvas).call(makeZoom());
    onResize();
  }

  // =========================================================================
  //  shared behaviour
  // =========================================================================
  function makeZoom() {
    return d3.zoom().scaleExtent([0.5, 20])
      .on("zoom", (e) => { t = e.transform; draw(); });
  }

  const tip = document.getElementById("tip");
  function setHover(id, e, isCanvas) {
    if (id === hoverId) { if (e) moveTip(e); return; }
    hoverId = id;
    if (id == null) { tip.classList.remove("on"); place(); return; }
    const p = byId.get(String(id));
    if (!p) return;
    tip.innerHTML = "";
    tip.appendChild(infoNode(p, 240, false));
    tip.classList.add("on");
    if (e) moveTip(e);
    place();
  }
  function moveTip(e) {
    const pad = 14, w = tip.offsetWidth, h = tip.offsetHeight;
    let x = e.clientX + pad, y = e.clientY + pad;
    if (x + w > window.innerWidth - 6) x = e.clientX - w - pad;
    if (y + h > window.innerHeight - 6) y = e.clientY - h - pad;
    tip.style.left = Math.max(6, x) + "px";
    tip.style.top = Math.max(6, y) + "px";
  }

  // Build the shared title/authors/cluster/abstract block.
  function infoNode(p, absLen, withOpen) {
    const wrap = document.createElement("div");
    const t1 = el("div", "tt-title", p.title);
    const au = el("div", "tt-auth", (p.authors || []).join(", "));
    const cl = document.createElement("div"); cl.className = "tt-cl";
    const sw = document.createElement("span"); sw.className = "sw";
    sw.style.background = colorOf(p.cluster);
    cl.appendChild(sw);
    cl.appendChild(document.createTextNode((clById.get(p.cluster) || {}).name || ""));
    wrap.append(t1, au, cl);
    if (p.abstract) {
      let a = p.abstract;
      if (absLen && a.length > absLen) a = a.slice(0, absLen).trimEnd() + "…";
      wrap.appendChild(el("div", "tt-abs", a));
    } else {
      wrap.appendChild(el("div", "tt-abs", "(no abstract available)"));
    }
    if (withOpen) {
      const link = document.createElement("a");
      link.className = "open"; link.href = p.file; link.target = "_blank";
      link.rel = "noopener"; link.textContent = "Open paper ↗";
      wrap.appendChild(link);
    }
    return wrap;
  }
  function el(tag, cls, txt) {
    const n = document.createElement(tag); n.className = cls;
    n.textContent = txt || ""; return n;
  }

  function onDotClick(e, p) {
    // Touch: single tap = hover/pin, double tap = open (handled below).
    if (e.pointerType === "touch") { touchTap(p, e); return; }
    window.open(p.file, "_blank", "noopener");
  }

  // ---- touch: tap = show card, double-tap = open --------------------------
  let lastTapId = null, lastTapAt = 0;
  function touchTap(p, e) {
    const now = e.timeStamp || performance.now();
    if (lastTapId === String(p.id) && now - lastTapAt < 380) {
      window.open(p.file, "_blank", "noopener"); return;
    }
    lastTapId = String(p.id); lastTapAt = now;
    pinCard(p.id);
  }

  // ---- pinned card ---------------------------------------------------------
  const card = document.getElementById("card");
  const cardBody = document.getElementById("cardbody");
  function pinCard(id) {
    const p = byId.get(String(id)); if (!p) return;
    pinnedId = String(id);
    cardBody.innerHTML = ""; cardBody.appendChild(infoNode(p, 0, true));
    card.classList.add("on");
  }
  function closeCard() { card.classList.remove("on"); pinnedId = null; }
  document.getElementById("cardx").addEventListener("click", closeCard);

  // ---- legend --------------------------------------------------------------
  const legrows = document.getElementById("legrows");
  const rowEls = new Map();
  for (const c of CLUSTERS) {
    const row = document.createElement("div"); row.className = "row";
    const sw = document.createElement("span"); sw.className = "sw";
    sw.style.background = c.color;
    const nm = el("span", "nm", c.name);
    const ct = el("span", "ct", String(c.size != null ? c.size : ""));
    row.append(sw, nm, ct);
    row.title = c.blurb || "";
    row.addEventListener("click", (e) => toggleCluster(c.id, e.shiftKey));
    legrows.appendChild(row);
    rowEls.set(c.id, row);
  }
  function toggleCluster(cid, additive) {
    if (additive) {
      selected.has(cid) ? selected.delete(cid) : selected.add(cid);
    } else {
      if (selected.size === 1 && selected.has(cid)) selected.clear();
      else { selected.clear(); selected.add(cid); }
    }
    syncLegend(); draw();
  }
  function syncLegend() {
    for (const [cid, row] of rowEls)
      row.classList.toggle("muted", selected.size > 0 && !selected.has(cid));
  }

  // ---- search --------------------------------------------------------------
  const qInput = document.getElementById("q");
  const qCount = document.getElementById("qcount");
  qInput.addEventListener("input", () => {
    query = qInput.value.trim().toLowerCase();
    qCount.textContent = query ? `${POINTS.filter(matches).length} match` : "";
    draw();
  });

  // ---- legend toggle (mobile) ---------------------------------------------
  document.getElementById("legToggle").addEventListener("click", () =>
    document.getElementById("legend").classList.toggle("open"));

  // ---- keyboard: Esc resets -----------------------------------------------
  window.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      selected.clear(); syncLegend();
      query = ""; qInput.value = ""; qCount.textContent = "";
      closeCard(); setHover(null);
      draw();
    }
  });

  // ---- resize --------------------------------------------------------------
  function onResize() { computeLayout(); draw(); }
  window.addEventListener("resize", () => onResize());

  // ---- deep link ?p=<id>: center + open the card --------------------------
  function centerOn(p, k) {
    k = k || 2.4;
    const tx = W / 2 - k * p.sx, ty = H / 2 - k * p.sy;
    const tr = d3.zoomIdentity.translate(tx, ty).scale(k);
    const sel = d3.select(app).select(USE_CANVAS ? "canvas" : "svg");
    sel.transition().duration(650).call(makeZoom().transform, tr);
  }
  (function deepLink() {
    const id = new URLSearchParams(location.search).get("p");
    if (!id) return;
    const p = byId.get(String(id));
    if (!p) return;
    // wait a tick so layout/zoom are wired up
    setTimeout(() => { centerOn(p, 3); pinCard(p.id); }, 60);
  })();

  draw();
})();
</script>
</body>
</html>
